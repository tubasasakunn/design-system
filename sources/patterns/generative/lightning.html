<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="稲妻">
<meta name="pattern-desc" content="クリック地点へ向かって中点変位法で稲妻の主放電を生成し、確率的に枝分かれさせ、残光を減衰させて消す。落雷の瞬間は画面がわずかに明るむ。">
<title>稲妻</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    height: 100dvh;
  }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  .panel {
    position: fixed; left: 24px; bottom: 24px; max-width: 320px;
    padding: 14px 18px; border-radius: 20px;
    background: color-mix(in srgb, var(--color-bg-elevated) 80%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(10px);
    pointer-events: none;
  }
  .panel h1 { font-size: .95rem; font-weight: 600; letter-spacing: .04em; }
  .panel p { margin-top: 4px; font-size: .76rem; line-height: 1.6; color: var(--color-fg-muted); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="panel">
  <h1>稲妻</h1>
  <p>画面をクリック・タップすると、そこへ向かって稲妻が走り、枝分かれし、残光が消えていきます。</p>
</div>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const rm = matchMedia("(prefers-reduced-motion: reduce)");

  const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
  const hex = (h) => {
    h = h.replace("#", "");
    if (h.length === 3) h = h.split("").map((c) => c + c).join("");
    const n = parseInt(h.slice(0, 6), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  };
  const rgba = (c, a) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`;
  const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];

  let bg, ink, accent, elev;
  let glow, core;
  function readColors() {
    bg = hex(token("--color-bg-primary", "#faf7f1"));
    elev = hex(token("--color-bg-elevated", "#fffdf9"));
    ink = hex(token("--color-fg-primary", "#2c2a26"));
    accent = hex(token("--color-accent-default", "#5bbcb1"));
    // 放電の色: ティール寄りの光と、ほぼ白い芯
    glow = accent;
    core = mix(elev, accent, 0.25);
  }

  let W = 0, H = 0;
  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round"; ctx.lineJoin = "round";
  }

  // ---- 中点変位法で 2 点間の稲妻ポリラインを生成 ----
  // 返り値: {segs:[{x1,y1,x2,y2}], branches:[{x,y,dx,dy,len}]}
  function makeBolt(x1, y1, x2, y2, displace, branchChance) {
    let points = [{ x: x1, y: y1 }, { x: x2, y: y2 }];
    let d = displace;
    const branchSeeds = [];
    while (d > 3) {
      const next = [];
      for (let i = 0; i < points.length - 1; i++) {
        const a = points[i], b = points[i + 1];
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        // 線分に垂直な方向へ変位
        let nx = -(b.y - a.y), ny = b.x - a.x;
        const len = Math.hypot(nx, ny) || 1;
        nx /= len; ny /= len;
        const off = (Math.random() - 0.5) * 2 * d;
        const px = mx + nx * off, py = my + ny * off;
        next.push(a);
        next.push({ x: px, y: py });
        // まれに枝分かれの種を撒く
        if (Math.random() < branchChance) {
          const dx = b.x - a.x, dy = b.y - a.y;
          const bl = Math.hypot(dx, dy);
          branchSeeds.push({ x: px, y: py, dx: dx / (bl || 1), dy: dy / (bl || 1), len: bl });
        }
      }
      next.push(points[points.length - 1]);
      points = next;
      d *= 0.55;
    }
    const segs = [];
    for (let i = 0; i < points.length - 1; i++)
      segs.push({ x1: points[i].x, y1: points[i].y, x2: points[i + 1].x, y2: points[i + 1].y });
    return { segs, branchSeeds };
  }

  const bolts = [];   // {segs, life, width}
  let flash = 0;

  function strike(tx, ty) {
    // 上端の適当な位置から発する（雲から）
    const sx = tx + (Math.random() - 0.5) * W * 0.2;
    const sy = -10;
    const dist = Math.hypot(tx - sx, ty - sy);
    const main = makeBolt(sx, sy, tx, ty, Math.min(dist * 0.35, 160), 0.35);
    bolts.push({ segs: main.segs, life: 1, width: 2.4 });

    // 枝分かれ（主放電から分岐して逸れていく）
    for (const seed of main.branchSeeds) {
      if (Math.random() > 0.55) continue;
      const ang = Math.atan2(seed.dy, seed.dx) + (Math.random() - 0.5) * 1.3;
      const blen = seed.len * (0.35 + Math.random() * 0.4);
      const ex = seed.x + Math.cos(ang) * blen;
      const ey = seed.y + Math.sin(ang) * blen;
      const br = makeBolt(seed.x, seed.y, ex, ey, blen * 0.3, 0.12);
      bolts.push({ segs: br.segs, life: 0.8, width: 1.2 });
    }
    flash = 1;
  }

  function drawBolt(bolt) {
    const a = bolt.life;
    // 外側のにじみ（グロー）
    ctx.strokeStyle = rgba(glow, a * 0.28);
    ctx.lineWidth = bolt.width * 5;
    ctx.beginPath();
    for (const s of bolt.segs) { ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); }
    ctx.stroke();
    // 中間の光
    ctx.strokeStyle = rgba(mix(glow, core, 0.5), a * 0.6);
    ctx.lineWidth = bolt.width * 2.2;
    ctx.stroke();
    // 白熱した芯
    ctx.strokeStyle = rgba(core, a * 0.95);
    ctx.lineWidth = bolt.width;
    ctx.stroke();
  }

  function render() {
    // 生成りの空。上を少し暗くしてコントラスト
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, rgba(mix(bg, ink, 0.06), 1));
    sky.addColorStop(1, rgba(bg, 1));
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // 落雷の明滅
    if (flash > 0.001) {
      ctx.fillStyle = rgba(mix(elev, accent, 0.3), flash * 0.16);
      ctx.fillRect(0, 0, W, H);
    }

    ctx.globalCompositeOperation = "lighter";
    for (const b of bolts) drawBolt(b);
    ctx.globalCompositeOperation = "source-over";
  }

  let last = performance.now(), autoTimer = 2 + Math.random() * 2;
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;

    // 残光の減衰
    for (const b of bolts) b.life -= dt * (rm.matches ? 6 : 1.7);
    for (let i = bolts.length - 1; i >= 0; i--) if (bolts[i].life <= 0) bolts.splice(i, 1);
    if (flash > 0) flash = Math.max(0, flash - dt * 3);

    // ときどき自動で落雷（静けさの中の一閃）
    if (!rm.matches) {
      autoTimer -= dt;
      if (autoTimer <= 0) {
        strike(W * (0.25 + Math.random() * 0.5), H * (0.55 + Math.random() * 0.35));
        autoTimer = 2.5 + Math.random() * 3;
      }
    }

    render();
    requestAnimationFrame(frame);
  }

  canvas.addEventListener("pointerdown", (e) => {
    strike(e.clientX, e.clientY);
    autoTimer = 2.5 + Math.random() * 3;
  });

  new MutationObserver(readColors).observe(document.documentElement, {
    attributes: true, attributeFilter: ["data-theme", "data-appearance"],
  });
  addEventListener("resize", resize);

  resize(); readColors();
  requestAnimationFrame((t0) => { last = t0; requestAnimationFrame(frame); });
})();
</script>
</body>
</html>
