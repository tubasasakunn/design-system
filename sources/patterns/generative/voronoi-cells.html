<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="うごめく細胞">
<meta name="pattern-desc" content="動く母点のボロノイ分割を半平面クリッピングで多角形として求め、角を丸めて有機的な細胞のようにうごめかせる。">
<title>うごめく細胞</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    height: 100dvh;
  }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  .caption {
    position: fixed; left: 24px; bottom: 24px; max-width: 320px;
    padding: 14px 18px; border-radius: 20px;
    background: color-mix(in srgb, var(--color-bg-elevated) 78%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(10px);
    pointer-events: none;
  }
  .caption h1 { font-size: .95rem; font-weight: 600; letter-spacing: .04em; }
  .caption p { margin-top: 4px; font-size: .76rem; line-height: 1.6; color: var(--color-fg-muted); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="caption">
  <h1>うごめく細胞</h1>
  <p>母点がゆっくり漂い、ボロノイ分割が細胞のように形を変えます。クリック・タップで母点が増えます。</p>
</div>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const rm = matchMedia("(prefers-reduced-motion: reduce)");

  const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
  const hex = (h) => {
    h = h.replace("#", "");
    if (h.length === 3) h = h.split("").map((c) => c + c).join("");
    const n = parseInt(h.slice(0, 6), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  };
  const rgba = (c, a) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`;
  const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];

  // 細胞に振るパステル（淡色）
  const PASTELS = ["#5bbcb1", "#f0a8bd", "#f1d189", "#bcb2e8", "#f3a890", "#9fc8ea", "#a9dcc0"].map(hex);
  let bg, ink, edge, elev;
  function readColors() {
    bg = hex(token("--color-bg-primary", "#faf7f1"));
    elev = hex(token("--color-bg-elevated", "#fffdf9"));
    ink = hex(token("--color-fg-primary", "#2c2a26"));
    edge = hex(token("--color-border-strong", "#ddd5c6"));
  }

  let W = 0, H = 0;
  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
  }

  // ---- 母点（漂う）----
  const sites = [];
  function spawn(x, y) {
    const a = Math.random() * Math.PI * 2, sp = 8 + Math.random() * 14;
    sites.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      hue: PASTELS[(Math.random() * PASTELS.length) | 0],
      ph: Math.random() * Math.PI * 2,      // 呼吸位相
    });
  }
  function seed() {
    sites.length = 0;
    const n = Math.min(22, Math.max(12, Math.round((W * H) / 42000)));
    for (let i = 0; i < n; i++) spawn(Math.random() * W, Math.random() * H);
  }

  // ---- ある母点のセル多角形を、境界矩形を各二等分線で半平面クリップして求める ----
  // Sutherland–Hodgman。クリップ半平面: 点 s に近い側 = a·p <= c
  function clipCell(idx) {
    const s = sites[idx];
    // 少し外側までの矩形から開始（角丸が画面外に出るように）
    let poly = [[-40, -40], [W + 40, -40], [W + 40, H + 40], [-40, H + 40]];
    for (let j = 0; j < sites.length && poly.length; j++) {
      if (j === idx) continue;
      const t = sites[j];
      const ax = t.x - s.x, ay = t.y - s.y;               // 法線（t 方向）
      const c = (ax * (s.x + t.x) + ay * (s.y + t.y)) * 0.5; // 中点を通る
      // 保持条件: ax*px + ay*py <= c
      const out = [];
      for (let k = 0; k < poly.length; k++) {
        const p = poly[k], q = poly[(k + 1) % poly.length];
        const dp = ax * p[0] + ay * p[1] - c;
        const dq = ax * q[0] + ay * q[1] - c;
        if (dp <= 0) out.push(p);
        if ((dp < 0) !== (dq < 0)) {
          const tt = dp / (dp - dq);
          out.push([p[0] + (q[0] - p[0]) * tt, p[1] + (q[1] - p[1]) * tt]);
        }
      }
      poly = out;
    }
    return poly;
  }

  // ---- 角を丸めた多角形パスを引く（各頂点で前後へオフセットし二次曲線でつなぐ）----
  function roundedPath(poly, radius) {
    const n = poly.length;
    if (n < 3) return;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const prev = poly[(i - 1 + n) % n], cur = poly[i], next = poly[(i + 1) % n];
      const v1x = prev[0] - cur[0], v1y = prev[1] - cur[1];
      const v2x = next[0] - cur[0], v2y = next[1] - cur[1];
      const l1 = Math.hypot(v1x, v1y) || 1, l2 = Math.hypot(v2x, v2y) || 1;
      const r = Math.min(radius, l1 * 0.5, l2 * 0.5);
      const p1x = cur[0] + (v1x / l1) * r, p1y = cur[1] + (v1y / l1) * r;
      const p2x = cur[0] + (v2x / l2) * r, p2y = cur[1] + (v2y / l2) * r;
      if (i === 0) ctx.moveTo(p1x, p1y); else ctx.lineTo(p1x, p1y);
      ctx.quadraticCurveTo(cur[0], cur[1], p2x, p2y);
    }
    ctx.closePath();
  }

  // ---- 入力 ----
  canvas.addEventListener("pointerdown", (e) => {
    if (sites.length < 60) spawn(e.clientX, e.clientY);
  });

  // ---- 更新 ----
  let t = 0;
  function update(dt) {
    t += dt;
    for (const s of sites) {
      if (!rm.matches) {
        // 呼吸するような微小な揺らぎを速度に加える
        s.vx += Math.cos(s.ph + t * 0.6) * 6 * dt;
        s.vy += Math.sin(s.ph * 1.3 + t * 0.5) * 6 * dt;
        s.x += s.vx * dt; s.y += s.vy * dt;
        // 減衰して暴走を防ぐ
        s.vx *= 0.985; s.vy *= 0.985;
      }
      // 壁で反射
      const m = 12;
      if (s.x < m) { s.x = m; s.vx = Math.abs(s.vx); }
      if (s.x > W - m) { s.x = W - m; s.vx = -Math.abs(s.vx); }
      if (s.y < m) { s.y = m; s.vy = Math.abs(s.vy); }
      if (s.y > H - m) { s.y = H - m; s.vy = -Math.abs(s.vy); }
    }
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = rgba(bg, 1);
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < sites.length; i++) {
      const s = sites[i];
      const poly = clipCell(i);
      if (poly.length < 3) continue;
      roundedPath(poly, 16);
      // 淡いパステルで塗り、母点方向へわずかに濃淡（膜のよう）
      const grad = ctx.createRadialGradient(s.x, s.y, 2, s.x, s.y, 160);
      grad.addColorStop(0, rgba(mix(elev, s.hue, 0.42), 0.95));
      grad.addColorStop(1, rgba(mix(bg, s.hue, 0.22), 0.95));
      ctx.fillStyle = grad;
      ctx.fill();
      // 細胞膜（控えめな罫線）
      ctx.lineWidth = 1.4;
      ctx.strokeStyle = rgba(mix(edge, s.hue, 0.4), 0.9);
      ctx.stroke();
    }
    // 核（母点）
    for (const s of sites) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2.4, 0, Math.PI * 2);
      ctx.fillStyle = rgba(mix(ink, s.hue, 0.35), 0.55);
      ctx.fill();
    }
  }

  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }

  new MutationObserver(readColors).observe(document.documentElement, {
    attributes: true, attributeFilter: ["data-theme", "data-appearance"],
  });
  addEventListener("resize", () => { const had = sites.length; resize(); if (!had) seed(); });
  resize();
  readColors();
  seed();
  requestAnimationFrame((t0) => { last = t0; requestAnimationFrame(frame); });
})();
</script>
</body>
</html>
