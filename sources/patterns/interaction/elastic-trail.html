<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>弾性トレイル</title>
<meta name="pattern-title" content="弾性トレイル">
<meta name="pattern-desc" content="ばねで数珠繋ぎの残像がカーソルを追い、速度で伸び縮みして止まると一点に収束する。">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    min-height: 100dvh;
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; width: 100vw; height: 100dvh; }
  .hint {
    position: fixed;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    margin: 0;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    color: var(--color-fg-muted);
    background: color-mix(in srgb, var(--color-bg-elevated) 70%, transparent);
    border: 1px solid var(--color-border-default);
    pointer-events: none;
    transition: opacity .4s ease;
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <p class="hint" id="hint">動かすと伸び、止まると一点に集まります</p>
<script>
(() => {
  "use strict";
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const root = document.documentElement;
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const hint = document.getElementById("hint");

  const token = (n, fb) => getComputedStyle(root).getPropertyValue(n).trim() || fb;
  let COL = {};
  function readColors() {
    COL.accent = token("--color-accent-default", "#5bbcb1");
    COL.accentH = token("--color-accent-hover", "#46a89d");
    COL.fg = token("--color-fg-primary", "#2c2a26");
    COL.muted = token("--color-fg-muted", "#a79f91");
  }
  readColors();
  new MutationObserver(readColors).observe(root, { attributes: true, attributeFilter: ["data-theme", "data-appearance"] });

  let W = 0, H = 0, dpr = 1;
  function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  addEventListener("resize", resize);

  // 数珠繋ぎの節。head はポインタを追い、以降は前の節をばねで追う。
  const N = 26;
  const nodes = [];
  for (let i = 0; i < N; i++) nodes.push({ x: W / 2, y: H / 2, vx: 0, vy: 0 });

  const pointer = { x: W / 2, y: H / 2, px: W / 2, py: H / 2, speed: 0 };
  let moved = false;
  function onMove(e) {
    pointer.x = e.clientX; pointer.y = e.clientY;
    if (!moved) { moved = true; hint.style.opacity = "0"; }
  }
  addEventListener("pointermove", onMove, { passive: true });
  addEventListener("pointerdown", onMove, { passive: true });

  // ばね（頭）とチェーンばね
  const HEAD_K = 220, HEAD_D = 20;
  const LINK_K = 320, LINK_D = 22;

  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;

    // ポインタ速度（px/s）を平滑化
    const instSpeed = Math.hypot(pointer.x - pointer.px, pointer.y - pointer.py) / (dt || 1e-3);
    pointer.px = pointer.x; pointer.py = pointer.y;
    pointer.speed += (instSpeed - pointer.speed) * Math.min(1, dt * 12);

    // 速度→節の間隔（rest length）。止まると 0 に収束し一点へ。
    const stretch = Math.min(1, pointer.speed / 1400);
    const rest = reduce ? 0 : 3 + stretch * 26;   // px
    // 速度→太さ倍率（速いほど細く鋭く、遅いと丸い）
    const thick = 1 - stretch * 0.45;

    // 頭：ポインタへばね
    const head = nodes[0];
    if (reduce) { head.x = pointer.x; head.y = pointer.y; head.vx = head.vy = 0; }
    else {
      head.vx += (HEAD_K * (pointer.x - head.x) - HEAD_D * head.vx) * dt;
      head.vy += (HEAD_K * (pointer.y - head.y) - HEAD_D * head.vy) * dt;
      head.x += head.vx * dt; head.y += head.vy * dt;
    }

    // 後続：前の節から rest だけ離れた点へばね（距離拘束をばねで表現）
    for (let i = 1; i < N; i++) {
      const p = nodes[i - 1], c = nodes[i];
      let dx = c.x - p.x, dy = c.y - p.y;
      let d = Math.hypot(dx, dy) || 1e-3;
      // 目標位置：p から現在方向へ rest 離れた点
      const tx = p.x + (dx / d) * rest;
      const ty = p.y + (dy / d) * rest;
      if (reduce) { c.x = tx; c.y = ty; c.vx = c.vy = 0; }
      else {
        c.vx += (LINK_K * (tx - c.x) - LINK_D * c.vx) * dt;
        c.vy += (LINK_K * (ty - c.y) - LINK_D * c.vy) * dt;
        c.x += c.vx * dt; c.y += c.vy * dt;
      }
    }

    draw(thick);
    requestAnimationFrame(frame);
  }

  function lerpHex(a, b, t) {
    const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
    const ar=(pa>>16)&255, ag=(pa>>8)&255, ab=pa&255;
    const br=(pb>>16)&255, bg=(pb>>8)&255, bb=pb&255;
    const r=Math.round(ar+(br-ar)*t), g=Math.round(ag+(bg-ag)*t), bl=Math.round(ab+(bb-ab)*t);
    return "rgb(" + r + "," + g + "," + bl + ")";
  }

  function draw(thick) {
    ctx.clearRect(0, 0, W, H);
    ctx.lineJoin = "round"; ctx.lineCap = "round";

    // 一本のテーパードなリボンとして、区間ごとに太さを変えて描く
    for (let i = 1; i < N; i++) {
      const p = nodes[i - 1], c = nodes[i];
      const t = i / (N - 1);                 // 0(頭)→1(尾)
      const taper = Math.pow(1 - t, 0.9);    // 尾へ細くなる
      const w = Math.max(0.6, (2 + 20 * taper) * thick);
      ctx.strokeStyle = lerpHex(COL.accent, COL.accentH, t);
      ctx.globalAlpha = 0.35 + 0.55 * (1 - t);
      ctx.lineWidth = w;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(c.x, c.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // 頭に光る点
    const h = nodes[0];
    const g = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, 16);
    g.addColorStop(0, COL.accent);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(h.x, h.y, 16, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = COL.fg;
    ctx.beginPath(); ctx.arc(h.x, h.y, 3.2, 0, Math.PI * 2); ctx.fill();
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
