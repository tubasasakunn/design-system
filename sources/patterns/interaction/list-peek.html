<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ホバーで覗く</title>
<meta name="pattern-title" content="ホバーで覗く">
<meta name="pattern-desc" content="リストにホバーすると、その項目を表す図形プレビューがカーソルへふわっと現れ、項目間でなめらかにモーフする。">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    min-height: 100dvh;
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 84px 28px 40px;
    box-sizing: border-box;
  }
  h1 {
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 600;
    letter-spacing: .04em;
    margin: 0 0 6px;
  }
  .lead {
    margin: 0 0 26px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--color-fg-muted);
  }
  ul { list-style: none; margin: 0; padding: 0; }
  li {
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 16px 18px;
    border-radius: 18px;
    cursor: pointer;
    transition: background .2s ease, transform .2s cubic-bezier(.2,.8,.2,1);
  }
  li .idx {
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: var(--color-fg-muted);
    width: 22px;
  }
  li .name { font-size: 17px; letter-spacing: .02em; }
  li .sub { margin-left: auto; font-size: 12px; color: var(--color-fg-muted); }
  li.on {
    background: color-mix(in srgb, var(--color-bg-elevated) 80%, transparent);
    transform: translateX(6px);
  }
  li::after {
    content: "";
    position: absolute; left: 18px; right: 18px; bottom: 0;
    height: 1px; background: var(--color-border-default);
    opacity: .6;
  }
  li:last-child::after { display: none; }

  .peek {
    position: fixed;
    top: 0; left: 0;
    width: 132px; height: 132px;
    pointer-events: none;
    border-radius: 24px;
    background: color-mix(in srgb, var(--color-bg-elevated) 94%, transparent);
    border: 1px solid var(--color-border-default);
    box-shadow: 0 24px 50px -22px rgba(40,35,25,.5), inset 0 1px 0 rgba(255,255,255,.3);
    backdrop-filter: blur(8px);
    opacity: 0;
    transform: translate(-50%, -50%) scale(.7);
    z-index: 20;
    display: grid;
    place-items: center;
  }
  .peek canvas { width: 100px; height: 100px; display: block; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>ホバーで覗く</h1>
    <p class="lead">各項目にカーソルを合わせると、その項目を表す図形がふわっと現れて追従します。<br>項目を移ると図形はなめらかにモーフします。</p>
    <ul id="list"></ul>
  </div>
  <div class="peek" id="peek"><canvas id="cv"></canvas></div>

<script>
(() => {
  "use strict";
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const root = document.documentElement;
  const token = (n, fb) => getComputedStyle(root).getPropertyValue(n).trim() || fb;

  // パステル差し色（淡色の上には濃色インク）
  const PAL = {
    teal:["#5bbcb1","#07312d"], pink:["#f0a8bd","#5a2436"], yellow:["#f1d189","#5a4611"],
    lavender:["#bcb2e8","#2f2a55"], coral:["#f3a890","#5a2b1c"], sky:["#9fc8ea","#123049"], mint:["#a9dcc0","#134030"],
  };

  // 図形は「角度→半径」関数。同じ標本数で補間するとなめらかにモーフできる。
  const N = 72;
  const TAU = Math.PI * 2;
  function sample(fn) { const a = new Float64Array(N); for (let i=0;i<N;i++) a[i]=fn(i/N*TAU); return a; }
  const shapes = {
    circle:  sample(() => 1),
    blob:    sample(t => 1 + 0.18*Math.sin(3*t+0.4) + 0.10*Math.sin(5*t)),
    star:    sample(t => 0.62 + 0.38*Math.pow(Math.abs(Math.cos(2.5*t)), 0.6)),
    flower:  sample(t => 0.72 + 0.28*Math.abs(Math.sin(3*t))),
    hexagon: sample(t => { const s=Math.cos(Math.PI/6); return s/Math.cos(((t%(TAU/6))+TAU/12)-TAU/12); }),
    heart:   sample(t => { const a=t-Math.PI/2; return 0.62*(1 - 0.55*Math.sin(a)) * (1 + 0.16*Math.abs(Math.cos(a*1.5))); }),
    drop:    sample(t => 0.7 + 0.3*Math.cos(t - Math.PI/2)),
  };

  const ITEMS = [
    { name:"月のかたち",   sub:"circle",  shape:"circle",  col:"sky" },
    { name:"ぷにっと",     sub:"blob",     shape:"blob",     col:"mint" },
    { name:"星をひとつ",   sub:"star",     shape:"star",     col:"yellow" },
    { name:"はなびら",     sub:"flower",   shape:"flower",   col:"pink" },
    { name:"六角形の窓",   sub:"hexagon",  shape:"hexagon",  col:"lavender" },
    { name:"すきなもの",   sub:"heart",    shape:"heart",    col:"coral" },
    { name:"しずく",       sub:"drop",     shape:"drop",     col:"teal" },
  ];

  const list = document.getElementById("list");
  ITEMS.forEach((it, i) => {
    const li = document.createElement("li");
    li.innerHTML = '<span class="idx">'+String(i+1).padStart(2,"0")+'</span>'+
      '<span class="name">'+it.name+'</span><span class="sub">'+it.sub+'</span>';
    li.dataset.i = i;
    list.appendChild(li);
    it.el = li;
  });

  const peek = document.getElementById("peek");
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d");
  let dpr = 1, R = 40;
  function resize() {
    dpr = Math.min(2, devicePixelRatio || 1);
    cv.width = 100 * dpr; cv.height = 100 * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    R = 40;
  }
  resize();
  addEventListener("resize", resize);

  // 現在描画中の形（radius配列）と目標の形。毎フレーム目標へ近づける。
  const cur = shapes.circle.slice();
  let target = shapes.circle;
  const curCol = { bg:[0,0,0], ink:[0,0,0] };
  const tgtCol = { bg:[0,0,0], ink:[0,0,0] };
  function hexRGB(h){ h=h.replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join(''); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }

  let active = -1;
  let visible = 0;       // 0..1 表示量
  let px = innerWidth/2, py = innerHeight/2;   // カーソル
  let sx = px, sy = py;  // ばね補間されたプレビュー位置
  let scale = 0.7;

  function setActive(i) {
    if (i === active) return;
    ITEMS.forEach((it, k) => it.el.classList.toggle("on", k===i));
    active = i;
    if (i >= 0) {
      target = shapes[ITEMS[i].shape];
      const [bg, ink] = PAL[ITEMS[i].col];
      tgtCol.bg = hexRGB(bg); tgtCol.ink = hexRGB(ink);
    }
  }

  list.addEventListener("pointermove", (e) => {
    px = e.clientX; py = e.clientY;
    const li = e.target.closest("li");
    setActive(li ? +li.dataset.i : -1);
  }, { passive:true });
  list.addEventListener("pointerleave", () => setActive(-1));
  addEventListener("pointermove", (e) => { px = e.clientX; py = e.clientY; }, { passive:true });

  function lerp(a,b,t){ return a+(b-a)*t; }

  let last = performance.now();
  function frame(now) {
    let dt = (now - last)/1000; last = now;
    if (dt > 0.05) dt = 0.05;

    const want = active >= 0 ? 1 : 0;
    const k = reduce ? 1 : 1 - Math.pow(0.001, dt);   // フレーム非依存の指数緩和
    visible += (want - visible) * k;

    // 位置ばね（柔らかく追従）
    if (reduce) { sx = px; sy = py; } else {
      sx += (px + 92 - sx) * (1 - Math.pow(0.0025, dt));
      sy += (py - sy) * (1 - Math.pow(0.0025, dt));
    }
    scale += ((want ? 1 : 0.7) - scale) * k;

    // 形とカラーのモーフ
    const mk = reduce ? 1 : 1 - Math.pow(0.0009, dt);
    for (let i=0;i<N;i++) cur[i] = lerp(cur[i], target[i], mk);
    for (let c=0;c<3;c++){ curCol.bg[c]=lerp(curCol.bg[c],tgtCol.bg[c],mk); curCol.ink[c]=lerp(curCol.ink[c],tgtCol.ink[c],mk); }

    peek.style.opacity = visible.toFixed(3);
    peek.style.transform = "translate("+sx.toFixed(1)+"px,"+sy.toFixed(1)+"px) translate(-50%,-50%) scale("+scale.toFixed(3)+")";

    draw(now/1000);
    requestAnimationFrame(frame);
  }

  function draw(t) {
    ctx.clearRect(0,0,100,100);
    const cx = 50, cy = 50;
    const wob = reduce ? 0 : 1 + 0.02*Math.sin(t*2.2);
    ctx.beginPath();
    for (let i=0;i<=N;i++){
      const idx = i % N;
      const ang = idx/N*TAU - Math.PI/2;
      const r = cur[idx] * R * wob;
      const x = cx + Math.cos(ang)*r, y = cy + Math.sin(ang)*r;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    const bg = curCol.bg, ink = curCol.ink;
    const g = ctx.createLinearGradient(0,10,0,90);
    g.addColorStop(0, "rgb("+(bg[0]+18|0)+","+(bg[1]+18|0)+","+(bg[2]+18|0)+")");
    g.addColorStop(1, "rgb("+bg.map(v=>v|0).join(",")+")");
    ctx.fillStyle = g;
    ctx.shadowColor = "rgba("+ink.map(v=>v|0).join(",")+",.25)";
    ctx.shadowBlur = 10; ctx.shadowOffsetY = 5;
    ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.lineWidth = 1.4;
    ctx.strokeStyle = "rgba("+ink.map(v=>v|0).join(",")+",.35)";
    ctx.stroke();
  }
  requestAnimationFrame(frame);

  new MutationObserver(()=>{}).observe(root, { attributes:true, attributeFilter:["data-theme","data-appearance"] });
})();
</script>
</body>
</html>
