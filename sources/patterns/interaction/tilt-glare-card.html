<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>傾きカード</title>
<meta name="pattern-title" content="傾きカード">
<meta name="pattern-desc" content="ポインタで3Dに傾き、光沢と内部レイヤーの視差が動き、離れるとばねで水平へ戻るカード。">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    min-height: 100dvh;
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    overflow: hidden;
    display: grid;
    place-items: center;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  .scene { perspective: 1000px; padding: 24px; }
  .card {
    position: relative;
    width: min(78vw, 340px);
    aspect-ratio: 5 / 7;
    border-radius: 26px;
    transform-style: preserve-3d;
    will-change: transform;
    background:
      radial-gradient(120% 90% at 20% 12%, color-mix(in srgb, var(--color-accent-default) 22%, var(--color-bg-elevated)), transparent 60%),
      linear-gradient(150deg, var(--color-bg-elevated), var(--color-bg-secondary));
    border: 1px solid var(--color-border-default);
    box-shadow: 0 30px 60px -30px rgba(40, 35, 25, .5);
    overflow: hidden;
    cursor: grab;
  }
  .layer { position: absolute; will-change: transform; }
  .badge {
    top: 22px; left: 22px;
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; letter-spacing: .06em;
    color: var(--color-accent-fg);
    background: var(--color-accent-default);
    box-shadow: 0 8px 20px -10px var(--color-accent-default);
  }
  .orb {
    top: 30%; left: 50%;
    width: 150px; height: 150px; border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 35% 30%, #ffffff88, var(--color-accent-default) 55%, var(--color-accent-hover));
    box-shadow: inset 0 -14px 30px -12px rgba(0,0,0,.35), 0 20px 40px -18px var(--color-accent-default);
  }
  .ring {
    top: 30%; left: 50%;
    width: 210px; height: 210px; border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 1px dashed color-mix(in srgb, var(--color-fg-muted) 60%, transparent);
  }
  .caption { left: 24px; bottom: 26px; right: 24px; }
  .caption h2 { margin: 0 0 6px; font-size: 22px; font-weight: 600; color: var(--color-fg-primary); }
  .caption p { margin: 0; font-size: 13px; line-height: 1.6; color: var(--color-fg-secondary); }
  .glare {
    position: absolute; inset: -2px;
    border-radius: inherit;
    pointer-events: none;
    mix-blend-mode: soft-light;
    opacity: 0;
    background: radial-gradient(220px 220px at 50% 50%, rgba(255,255,255,.9), rgba(255,255,255,0) 60%);
  }
  .edge {
    position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4);
  }
  .hint {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    margin: 0; font-size: 13px; color: var(--color-fg-muted);
    background: color-mix(in srgb, var(--color-bg-elevated) 70%, transparent);
    padding: 7px 15px; border-radius: 999px; border: 1px solid var(--color-border-default);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="card" id="card">
      <div class="glare" id="glare"></div>
      <div class="layer ring"   data-depth="14"></div>
      <div class="layer orb"    data-depth="34"></div>
      <div class="layer badge"  data-depth="46">NEW</div>
      <div class="layer caption" data-depth="26">
        <h2>静かな傾き</h2>
        <p>ポインタで奥行きが動きます。指を離すとばねで水平へ戻ります。</p>
      </div>
      <div class="edge"></div>
    </div>
  </div>
  <p class="hint">カードの上でポインタを動かしてください</p>
<script>
(() => {
  "use strict";
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const root = document.documentElement;
  const card = document.getElementById("card");
  const glare = document.getElementById("glare");
  const layers = [...card.querySelectorAll(".layer")];

  const MAX_DEG = 15;        // 最大傾き
  // ばね状態：回転(rx, ry)、光沢位置(gx, gy)、光沢強度(gi)
  const S = { rx: 0, ry: 0, gx: 50, gy: 50, gi: 0 };
  const V = { rx: 0, ry: 0, gx: 0, gy: 0, gi: 0 };
  const T = { rx: 0, ry: 0, gx: 50, gy: 50, gi: 0 };

  let inside = false;
  function onMove(e) {
    const r = card.getBoundingClientRect();
    const nx = (e.clientX - r.left) / r.width;   // 0..1
    const ny = (e.clientY - r.top) / r.height;
    const within = nx >= -0.15 && nx <= 1.15 && ny >= -0.15 && ny <= 1.15;
    inside = within;
    if (within) {
      const cx = nx - 0.5, cy = ny - 0.5;        // -0.5..0.5
      T.ry = cx * 2 * MAX_DEG;                    // 左右 → Y軸回転
      T.rx = -cy * 2 * MAX_DEG;                   // 上下 → X軸回転
      T.gx = nx * 100; T.gy = ny * 100;
      T.gi = 1;
    } else resetTarget();
  }
  function resetTarget() { T.rx = 0; T.ry = 0; T.gx = 50; T.gy = 50; T.gi = 0; }
  addEventListener("pointermove", onMove, { passive: true });
  card.addEventListener("pointerleave", resetTarget);
  addEventListener("pointerleave", resetTarget);
  card.addEventListener("pointerdown", (e) => { card.style.cursor = "grabbing"; onMove(e); });
  addEventListener("pointerup", () => { card.style.cursor = "grab"; });

  const K = 170, D = 20;   // ばね（柔らかく上質）
  function spring(k, dt) {
    for (const key of ["rx","ry","gx","gy","gi"]) {
      if (reduce) { S[key] = T[key]; V[key] = 0; continue; }
      const a = k * (T[key] - S[key]) - D * V[key];
      V[key] += a * dt; S[key] += V[key] * dt;
    }
  }

  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    spring(K, dt);

    card.style.transform =
      "rotateX(" + S.rx.toFixed(3) + "deg) rotateY(" + S.ry.toFixed(3) + "deg)";

    // レイヤー視差：傾き量に比例して奥行き方向へずらす
    for (const el of layers) {
      const depth = parseFloat(el.dataset.depth) || 0;
      const tx = (S.ry / MAX_DEG) * depth;
      const ty = (-S.rx / MAX_DEG) * depth;
      const base = el.classList.contains("orb") || el.classList.contains("ring") ? "translate(-50%,-50%) " : "";
      el.style.transform = base + "translate3d(" + tx.toFixed(2) + "px," + ty.toFixed(2) + "px," + (depth * 0.6) + "px)";
    }

    glare.style.background =
      "radial-gradient(220px 220px at " + S.gx.toFixed(1) + "% " + S.gy.toFixed(1) + "%, rgba(255,255,255,.9), rgba(255,255,255,0) 60%)";
    glare.style.opacity = (S.gi * 0.85).toFixed(3);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // テーマ/外観は CSS 変数で自動追従。属性監視は仕様準拠のため保持。
  new MutationObserver(() => {}).observe(root, { attributes: true, attributeFilter: ["data-theme", "data-appearance"] });
})();
</script>
</body>
</html>
