<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="鼓動する光">
<meta name="pattern-desc" content="回路状のラインを光のパルスが走る。触れた地点から波紋のように光が伝播し、交差点で枝分かれする。加算合成のグロー。">
<title>鼓動する光</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif; background: var(--color-bg-primary); }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: pointer; }
  .hint {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    padding: .55rem 1.15rem; border-radius: 999px; font-size: .78rem; letter-spacing: .05em;
    color: var(--color-fg-secondary);
    background: color-mix(in srgb, var(--color-bg-elevated) 74%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(8px); pointer-events: none; white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="hint">画面に触れると光が波紋状に走り、交差点で枝分かれする</div>
<script>
(() => {
"use strict";
const canvas=document.getElementById("stage");
const ctx=canvas.getContext("2d");

const token=(n,fb)=>getComputedStyle(document.documentElement).getPropertyValue(n).trim()||fb;
const hexRgb=(h)=>{h=h.replace("#","");if(h.length===3)h=h.replace(/./g,c=>c+c);const n=parseInt(h.slice(0,6),16);return [(n>>16)&255,(n>>8)&255,n&255];};
const mix=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];
const rgb=(c)=>`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
const rgba=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
const C={};
const refreshColors=()=>{
  C.bg=hexRgb(token("--color-bg-primary","#faf7f1"));
  C.bg2=hexRgb(token("--color-bg-secondary","#f1ece2"));
  C.ink=hexRgb(token("--color-fg-primary","#2c2a26"));
  C.mut=hexRgb(token("--color-fg-muted","#a79f91"));
  C.acc=hexRgb(token("--color-accent-default","#5bbcb1"));
  C.accH=hexRgb(token("--color-accent-hover","#46a89d"));
  C.bord=hexRgb(token("--color-border-default","#ece6db"));
};
refreshColors();
new MutationObserver(refreshColors).observe(document.documentElement,{attributes:true,attributeFilter:["data-theme","data-appearance"]});

let W=0,H=0;
const rmq=window.matchMedia("(prefers-reduced-motion: reduce)");
let reduced=rmq.matches; rmq.addEventListener?.("change",e=>{reduced=e.matches;});

// ---- グラフ（回路） ----
let nodes=[], edges=[];
function buildGraph(){
  nodes=[]; edges=[];
  const cell=Math.max(78, Math.min(W,H)/9);
  const cols=Math.floor(W/cell)+1, rows=Math.floor(H/cell)+1;
  const ox=(W-(cols-1)*cell)/2, oy=(H-(rows-1)*cell)/2;
  const idx=(c,r)=>r*cols+c;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const j=(Math.random()-0.5)*cell*0.28;
    const j2=(Math.random()-0.5)*cell*0.28;
    nodes.push({x:ox+c*cell+j, y:oy+r*cell+j2, adj:[], glow:0});
  }
  const addEdge=(a,b)=>{
    if(a<0||b<0||a>=nodes.length||b>=nodes.length) return;
    const A=nodes[a],B=nodes[b]; const len=Math.hypot(B.x-A.x,B.y-A.y);
    const ei=edges.length; edges.push({a,b,len});
    A.adj.push({e:ei,to:b}); B.adj.push({e:ei,to:a});
  };
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(c<cols-1 && Math.random()<0.82) addEdge(idx(c,r),idx(c+1,r));
    if(r<rows-1 && Math.random()<0.82) addEdge(idx(c,r),idx(c,r+1));
    // まばらな対角トレース（回路らしさ）
    if(c<cols-1 && r<rows-1 && Math.random()<0.16) addEdge(idx(c,r),idx(c+1,r+1));
    if(c>0 && r<rows-1 && Math.random()<0.12) addEdge(idx(c,r),idx(c-1,r+1));
  }
}
const resize=()=>{const dpr=Math.min(2,window.devicePixelRatio||1);W=window.innerWidth;H=window.innerHeight;canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);buildGraph();};
window.addEventListener("resize",resize);resize();

// ---- 信号（エッジを走る光。ノードで分岐） ----
const SPEED=340;                 // px/s
const signals=[];
function emitFromNode(ni,energy,from){
  const n=nodes[ni]; n.glow=Math.max(n.glow,energy);
  for(const a of n.adj){
    if(a.to===from) continue;
    signals.push({e:a.e, from:ni, to:a.to, p:0, energy});
  }
}
function nearestNode(x,y){
  let bi=0,bd=1e9;
  for(let i=0;i<nodes.length;i++){const d=(nodes[i].x-x)**2+(nodes[i].y-y)**2; if(d<bd){bd=d;bi=i;}}
  return bi;
}

let autoT=0;
let prev=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-prev)/1000); prev=now;

  // 背景
  ctx.fillStyle=rgb(mix(C.bg,C.ink,0.02)); ctx.fillRect(0,0,W,H);

  // 自発的な鼓動（控えめ）
  if(!reduced){ autoT-=dt; if(autoT<=0 && signals.length<40){ autoT=2.2+Math.random()*2.5; emitFromNode(nearestNode(Math.random()*W,Math.random()*H),0.55,-1);} }

  // 基盤ライン（淡く）
  ctx.lineWidth=1; ctx.strokeStyle=rgba(C.bord,0.9);
  ctx.beginPath();
  for(const e of edges){ const A=nodes[e.a],B=nodes[e.b]; ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); }
  ctx.stroke();
  // ノード点
  ctx.fillStyle=rgba(C.mut,0.35);
  for(const n of nodes){ ctx.beginPath(); ctx.arc(n.x,n.y,1.6,0,6.283); ctx.fill(); }

  // 信号更新＋描画（加算）
  ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.lineCap="round";
  const arrived=[];
  for(let i=signals.length-1;i>=0;i--){
    const s=signals[i]; const e=edges[s.e];
    const A=nodes[s.from], B=nodes[s.to];
    s.p += (SPEED*dt)/(e.len||1);
    // トレイルとヘッドを描く
    const headT=Math.min(1,s.p);
    const trail=0.34;
    const t0=Math.max(0,headT-trail);
    const x0=A.x+(B.x-A.x)*t0, y0=A.y+(B.y-A.y)*t0;
    const x1=A.x+(B.x-A.x)*headT, y1=A.y+(B.y-A.y)*headT;
    const col=mix(C.acc,[210,255,246],0.45);
    const g=ctx.createLinearGradient(x0,y0,x1,y1);
    g.addColorStop(0, rgba(col,0)); g.addColorStop(1, rgba(col,0.5*s.energy));
    ctx.strokeStyle=g; ctx.lineWidth=2.4; ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
    // ヘッドのグロー
    const hr=7*s.energy+3;
    const hg=ctx.createRadialGradient(x1,y1,0,x1,y1,hr);
    hg.addColorStop(0, rgba([235,255,250],0.85*s.energy)); hg.addColorStop(0.4, rgba(col,0.5*s.energy)); hg.addColorStop(1, rgba(col,0));
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(x1,y1,hr,0,6.283); ctx.fill();
    if(s.p>=1){ arrived.push({to:s.to,from:s.from,energy:s.energy}); signals.splice(i,1); }
  }
  ctx.restore();

  // 到着した信号 → 交差点で分岐
  for(const a of arrived){
    const ne=a.energy*0.72;
    if(ne>0.13 && signals.length<260) emitFromNode(a.to, ne, a.from);
    else nodes[a.to].glow=Math.max(nodes[a.to].glow,a.energy);
  }

  // ノードのグロー（減衰）＋描画
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(const n of nodes){
    if(n.glow>0.02){
      const r=6+n.glow*16;
      const col=mix(C.accH,[220,255,248],0.5);
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r);
      g.addColorStop(0, rgba([240,255,252],0.9*n.glow)); g.addColorStop(0.4, rgba(col,0.5*n.glow)); g.addColorStop(1, rgba(col,0));
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,r,0,6.283); ctx.fill();
      n.glow*=Math.pow(0.12,dt); // 速めに減衰
      if(n.glow<0.02) n.glow=0;
    }
  }
  ctx.restore();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ---- 入力 ----
function burst(x,y){ emitFromNode(nearestNode(x,y), 1.0, -1); }
canvas.addEventListener("pointerdown",(e)=>{ canvas.setPointerCapture?.(e.pointerId); burst(e.clientX,e.clientY); });
canvas.addEventListener("pointermove",(e)=>{ if(e.buttons&1) { if(Math.random()<0.25) burst(e.clientX,e.clientY); } });
})();
</script>
</body>
</html>
