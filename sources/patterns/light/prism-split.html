<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="プリズム">
<meta name="pattern-desc" content="白い光線がプリズムで七色に分光する。プリズムを掴んで回すとスネルの法則に従い屈折角と分散が変わる。">
<title>プリズム</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif; background: var(--color-bg-primary); }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  #stage.grab { cursor: grabbing; }
  .hint {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    padding: .55rem 1.15rem; border-radius: 999px; font-size: .78rem; letter-spacing: .05em;
    color: var(--color-fg-secondary);
    background: color-mix(in srgb, var(--color-bg-elevated) 74%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(8px); pointer-events: none; white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="hint">プリズムをドラッグして回す ─ 角度で屈折と分散が変わる</div>
<script>
(() => {
"use strict";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");

const token = (n,fb)=>getComputedStyle(document.documentElement).getPropertyValue(n).trim()||fb;
const hexRgb = (h)=>{h=h.replace("#","");if(h.length===3)h=h.replace(/./g,c=>c+c);const n=parseInt(h.slice(0,6),16);return [(n>>16)&255,(n>>8)&255,n&255];};
const rgba = (c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
const rgb = (c)=>`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
const C = {};
const refreshColors = () => {
  C.bg=hexRgb(token("--color-bg-primary","#faf7f1"));
  C.bg2=hexRgb(token("--color-bg-secondary","#f1ece2"));
  C.elev=hexRgb(token("--color-bg-elevated","#fffdf9"));
  C.ink=hexRgb(token("--color-fg-primary","#2c2a26"));
  C.mut=hexRgb(token("--color-fg-muted","#a79f91"));
  C.acc=hexRgb(token("--color-accent-default","#5bbcb1"));
  C.bord=hexRgb(token("--color-border-strong","#ddd5c6"));
};
refreshColors();
new MutationObserver(refreshColors).observe(document.documentElement,{attributes:true,attributeFilter:["data-theme","data-appearance"]});

let W=0,H=0;
const resize=()=>{const dpr=Math.min(2,window.devicePixelRatio||1);W=window.innerWidth;H=window.innerHeight;canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);};
window.addEventListener("resize",resize);resize();

const rmq=window.matchMedia("(prefers-reduced-motion: reduce)");
let reduced=rmq.matches; rmq.addEventListener?.("change",e=>{reduced=e.matches;});

// ---- ベクトル ----
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1]];
const dot=(a,b)=>a[0]*b[0]+a[1]*b[1];
const len=(a)=>Math.hypot(a[0],a[1]);
const norm=(a)=>{const l=len(a)||1;return [a[0]/l,a[1]/l];};

// ---- スネルの法則 ----
// D:入射単位ベクトル, N:入射に対向する法線(N·D<0), n1->n2
function refract(D,N,n1,n2){
  const eta=n1/n2;
  const cosi=-dot(N,D);
  const s2=eta*eta*(1-cosi*cosi);
  if (s2>1) return null;                 // 全反射
  const cost=Math.sqrt(1-s2);
  return [ eta*D[0]+(eta*cosi-cost)*N[0], eta*D[1]+(eta*cosi-cost)*N[1] ];
}
function reflect(D,N){ const d=dot(D,N); return [D[0]-2*d*N[0], D[1]-2*d*N[1]]; }

// ---- 波長→RGB（近似） ----
function wlRGB(wl){
  let r=0,g=0,b=0;
  if(wl<440){r=-(wl-440)/(440-380);b=1;}
  else if(wl<490){g=(wl-440)/(490-440);b=1;}
  else if(wl<510){g=1;b=-(wl-510)/(510-490);}
  else if(wl<580){r=(wl-510)/(580-510);g=1;}
  else if(wl<645){r=1;g=-(wl-645)/(645-580);}
  else {r=1;}
  let f=1; if(wl>700)f=0.3+0.7*(780-wl)/80; else if(wl<420)f=0.3+0.7*(wl-380)/40;
  return [Math.round(255*Math.pow(r*f,0.8)),Math.round(255*Math.pow(g*f,0.8)),Math.round(255*Math.pow(b*f,0.8))];
}
// Cauchy 分散（可視化のため誇張）
function nOf(wl){ const um=wl/1000; return 1.49 + 0.018/(um*um); }
const WLS=[660,620,585,550,505,470,420];

// ---- レイと線分の交差 ----
function raySeg(O,D,A,B){
  const e=sub(B,A);
  const den = D[0]*(-e[1]) - D[1]*(-e[0]);
  if (Math.abs(den)<1e-9) return null;
  const dx=A[0]-O[0], dy=A[1]-O[1];
  const t = (dx*(-e[1]) - dy*(-e[0]))/den;
  const s = (D[0]*dy - D[1]*dx)/den;
  if (t>1e-4 && s>=-1e-6 && s<=1+1e-6) return {t, N: norm([e[1],-e[0]])};
  return null;
}

// ---- プリズム ----
let angle = -0.35, target = -0.35, dragging=false, autoDir=1;
let grabStart=0, angStart=0;
function prismVerts(){
  const cx=W*0.54, cy=H*0.5, R=Math.min(W,H)*0.24;
  const v=[];
  for(let i=0;i<3;i++){ const a=angle + i*2*Math.PI/3 - Math.PI/2; v.push([cx+Math.cos(a)*R, cy+Math.sin(a)*R]); }
  return {v, cx, cy, R};
}

// ---- 光線トレース ----
function trace(O,Din,edges){
  const pts=[O.slice()]; let D=norm(Din); let inside=false; let cur=O.slice();
  for(let step=0; step<10; step++){
    let best=null;
    for(const [A,B] of edges){ const h=raySeg(cur,D,A,B); if(h && (!best || h.t<best.t)) best=h, best.A=A, best.B=B; }
    if(!best) break;
    const P=[cur[0]+D[0]*best.t, cur[1]+D[1]*best.t];
    pts.push(P);
    let N=best.N.slice(); if(dot(N,D)>0){N=[-N[0],-N[1]];} // 入射に対向
    const n1 = inside ? this.n : 1, n2 = inside ? 1 : this.n;
    const Rt = refract(D,N,n1,n2);
    if(!Rt){ D=norm(reflect(D,N)); }
    else { D=norm(Rt); inside=!inside; }
    cur=P;
    if(!inside && step>0){ /* 外に出た: あと一手で画面外へ */ }
  }
  pts.push([cur[0]+D[0]*3000, cur[1]+D[1]*3000]);
  return pts;
}

let prev=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-prev)/1000); prev=now;
  if(!dragging && !reduced){ target += autoDir*dt*0.12; if(target>0.5){target=0.5;autoDir=-1;} if(target<-0.9){target=-0.9;autoDir=1;} }
  angle += (target-angle)*Math.min(1,dt*5);

  // 背景
  const g=ctx.createRadialGradient(W*0.5,H*0.5,0,W*0.5,H*0.5,Math.max(W,H)*0.7);
  g.addColorStop(0, rgb(C.bg)); g.addColorStop(1, rgb(mix(C.bg,C.ink,0.05)));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  const {v,cx,cy,R}=prismVerts();
  const edges=[[v[0],v[1]],[v[1],v[2]],[v[2],v[0]]];

  // 入射光（左から水平）
  const O=[ -20, cy - R*0.15 ];
  const Din=[1,0];

  // 全反射に頼らず、まず 550nm でエントリ点を取る
  const baseTrace = trace.call({n:nOf(550)}, O, Din, edges);
  const entry = baseTrace[1] || O;

  // 入射の白い光
  ctx.save();
  ctx.globalCompositeOperation="lighter";
  const wl0=ctx.createLinearGradient(O[0],O[1],entry[0],entry[1]);
  wl0.addColorStop(0, rgba([255,255,250],0.0));
  wl0.addColorStop(1, rgba([255,255,250],0.9));
  ctx.strokeStyle=wl0; ctx.lineWidth=3.2; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(O[0],O[1]); ctx.lineTo(entry[0],entry[1]); ctx.stroke();
  ctx.strokeStyle=rgba([255,255,255],0.6); ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(O[0],O[1]); ctx.lineTo(entry[0],entry[1]); ctx.stroke();
  ctx.restore();

  // プリズム本体（ガラス）
  ctx.save();
  ctx.beginPath(); ctx.moveTo(v[0][0],v[0][1]); ctx.lineTo(v[1][0],v[1][1]); ctx.lineTo(v[2][0],v[2][1]); ctx.closePath();
  const pg=ctx.createLinearGradient(cx-R,cy-R,cx+R,cy+R);
  pg.addColorStop(0, rgba(C.elev,0.5)); pg.addColorStop(1, rgba(mix(C.elev,C.acc,0.2),0.34));
  ctx.fillStyle=pg; ctx.fill();
  ctx.strokeStyle=rgba(C.bord,0.9); ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();

  // 各波長のトレースを加算合成で描く
  ctx.save();
  ctx.globalCompositeOperation="lighter";
  ctx.lineCap="round"; ctx.lineJoin="round";
  for(const wl of WLS){
    const col=wlRGB(wl);
    const pts=trace.call({n:nOf(wl)}, O, Din, edges);
    // entry 以降のみ描く（入射は白で描画済み）
    // グロー（太く薄く）
    ctx.strokeStyle=rgba(col,0.10); ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(pts[1][0],pts[1][1]);
    for(let i=2;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.stroke();
    // 芯
    ctx.strokeStyle=rgba(col,0.85); ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(pts[1][0],pts[1][1]);
    for(let i=2;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.stroke();
  }
  ctx.restore();

  // プリズムの角ハンドルの淡い印
  ctx.fillStyle=rgba(C.mut,0.25);
  for(const p of v){ ctx.beginPath(); ctx.arc(p[0],p[1],4,0,6.283); ctx.fill(); }

  requestAnimationFrame(frame);
}
function mix(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];}
requestAnimationFrame(frame);

// ---- 入力（プリズムを掴んで回す） ----
canvas.addEventListener("pointerdown",(e)=>{
  const {cx,cy}=prismVerts();
  dragging=true; canvas.classList.add("grab"); canvas.setPointerCapture?.(e.pointerId);
  grabStart=Math.atan2(e.clientY-cy, e.clientX-cx); angStart=angle;
});
canvas.addEventListener("pointermove",(e)=>{
  if(!dragging) return;
  const {cx,cy}=prismVerts();
  const a=Math.atan2(e.clientY-cy, e.clientX-cx);
  target = angle = angStart + (a-grabStart);
});
const end=()=>{ dragging=false; canvas.classList.remove("grab"); target=angle; };
canvas.addEventListener("pointerup",end); canvas.addEventListener("pointercancel",end);
})();
</script>
</body>
</html>
