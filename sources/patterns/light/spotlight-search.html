<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="探照灯">
<meta name="pattern-desc" content="暗がりをスポットライトで照らし、隠れた図形とことばを探す。見つけた数を数える。">
<title>探照灯</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif;
    background: var(--color-bg-primary);
  }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: none; }
  .panel {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: .9rem;
    padding: .5rem 1.1rem; border-radius: 999px; font-size: .8rem; letter-spacing: .04em;
    color: var(--color-fg-secondary);
    background: color-mix(in srgb, var(--color-bg-elevated) 72%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(8px); pointer-events: none; white-space: nowrap;
  }
  .panel b { color: var(--color-accent-default); font-variant-numeric: tabular-nums; font-size: 1rem; }
  .panel .sep { width: 1px; height: 1rem; background: var(--color-border-strong); }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="panel">
  <span>暗がりを照らして探す</span><span class="sep"></span>
  <span>みつけた <b id="found">0</b> / <b id="total">0</b></span>
</div>
<script>
(() => {
"use strict";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const foundEl = document.getElementById("found");
const totalEl = document.getElementById("total");

/* ---- テーマトークン ---- */
const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
const hexRgb = (h) => {
  h = h.replace("#", "");
  if (h.length === 3) h = h.replace(/./g, (c) => c + c);
  const n = parseInt(h.slice(0, 6), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
};
const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
const rgba = (c, a) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`;
const lum = (c) => (0.299 * c[0] + 0.587 * c[1] + 0.114 * c[2]) / 255;

const PAL = ["#5bbcb1", "#f0a8bd", "#f1d189", "#bcb2e8", "#f3a890", "#9fc8ea", "#a9dcc0"];
const C = {};
const refresh = () => {
  const bg = hexRgb(token("--color-bg-primary", "#faf7f1"));
  const ink = hexRgb(token("--color-accent-fg", "#07312d"));
  const dark = lum(bg) < 0.4;
  // 探すための暗がり: 深いインクを敷く(暗い外観でもさらに沈める)
  C.dark = dark ? mix(bg, [0, 0, 0], 0.45) : mix(bg, ink, 0.93);
  C.accent = hexRgb(token("--color-accent-default", "#5bbcb1"));
  C.ink = dark ? hexRgb(token("--color-fg-primary", "#f2ede4")) : hexRgb("#07312d");
  C.pal = PAL.map(hexRgb);
};
refresh();
new MutationObserver(refresh).observe(document.documentElement, {
  attributes: true, attributeFilter: ["data-theme", "data-appearance"],
});

/* ---- キャンバス ---- */
let W = 0, H = 0, dpr = 1;
const resize = () => {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (!items.length) layout();
};
window.addEventListener("resize", resize);

const rmq = window.matchMedia("(prefers-reduced-motion: reduce)");
let reduced = rmq.matches;
rmq.addEventListener?.("change", (e) => { reduced = e.matches; });

/* ---- 隠された図形/ことば ---- */
const WORDS = ["ひみつ", "ほし", "しずく", "たね", "こだま", "ゆめ", "なぎ", "ともしび"];
const SHAPES = ["circle", "triangle", "square", "diamond", "flower", "star"];
let items = [];
function layout() {
  items = [];
  const n = 14;
  const R = Math.min(W, H) * 0.055;
  // ポアソン風に重ならないよう配置
  let tries = 0;
  while (items.length < n && tries < 800) {
    tries++;
    const x = R * 2 + Math.random() * (W - R * 4);
    const y = R * 2 + Math.random() * (H - R * 5);
    if (y < 90 && (x < 120 || x > W - 120)) continue; // 角のUIを避ける
    if (items.some((it) => Math.hypot(it.x - x, it.y - y) < R * 3.2)) continue;
    const isWord = Math.random() < 0.4;
    items.push({
      x, y, r: R, found: false, reveal: 0,
      rot: Math.random() * Math.PI, ph: Math.random() * Math.PI * 2,
      col: items.length % PAL.length,
      kind: isWord ? "word" : "shape",
      word: WORDS[items.length % WORDS.length],
      shape: SHAPES[(Math.random() * SHAPES.length) | 0],
    });
  }
  totalEl.textContent = items.length;
}
resize();

/* ---- スポットライト(ポインタ追従) ---- */
const spot = { x: W / 2, y: H / 2, tx: W / 2, ty: H / 2, r: 0 };
let hasPointer = false;
const setSpot = (x, y) => { spot.tx = x; spot.ty = y; hasPointer = true; };
window.addEventListener("pointermove", (e) => setSpot(e.clientX, e.clientY), { passive: true });
window.addEventListener("pointerdown", (e) => setSpot(e.clientX, e.clientY), { passive: true });

/* ---- 図形描画 ---- */
function drawShape(it, alpha, scale) {
  const c = C.pal[it.col];
  ctx.save();
  ctx.translate(it.x, it.y);
  ctx.rotate(it.rot);
  ctx.scale(scale, scale);
  ctx.fillStyle = rgba(c, alpha);
  ctx.strokeStyle = rgba(mix(c, [255, 255, 255], 0.3), alpha);
  ctx.lineWidth = 2;
  const r = it.r;
  ctx.beginPath();
  if (it.kind === "word") {
    ctx.fillStyle = rgba(c, alpha * 0.22);
    ctx.arc(0, 0, r * 1.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = rgba(C.ink, alpha);
    ctx.font = `600 ${Math.round(r * 0.62)}px system-ui, sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(it.word, 0, 1);
    ctx.restore();
    return;
  }
  switch (it.shape) {
    case "circle": ctx.arc(0, 0, r, 0, Math.PI * 2); break;
    case "square": ctx.rect(-r * 0.8, -r * 0.8, r * 1.6, r * 1.6); break;
    case "triangle":
      for (let i = 0; i < 3; i++) { const a = -Math.PI / 2 + i * Math.PI * 2 / 3; ctx[i ? "lineTo" : "moveTo"](Math.cos(a) * r, Math.sin(a) * r); }
      ctx.closePath(); break;
    case "diamond":
      ctx.moveTo(0, -r); ctx.lineTo(r * 0.8, 0); ctx.lineTo(0, r); ctx.lineTo(-r * 0.8, 0); ctx.closePath(); break;
    case "star":
      for (let i = 0; i < 10; i++) { const a = -Math.PI / 2 + i * Math.PI / 5; const rr = i % 2 ? r * 0.45 : r; ctx[i ? "lineTo" : "moveTo"](Math.cos(a) * rr, Math.sin(a) * rr); }
      ctx.closePath(); break;
    case "flower":
      for (let i = 0; i <= 48; i++) { const a = i / 48 * Math.PI * 2; const rr = r * (0.62 + 0.38 * Math.abs(Math.cos(2.5 * a))); ctx[i ? "lineTo" : "moveTo"](Math.cos(a) * rr, Math.sin(a) * rr); }
      ctx.closePath(); break;
  }
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

/* ---- 描画ループ ---- */
let t = 0, last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  if (!reduced) t += dt;
  if (!hasPointer) { spot.tx = W / 2 + Math.cos(t * 0.5) * W * 0.25; spot.ty = H / 2 + Math.sin(t * 0.7) * H * 0.2; }
  spot.x += (spot.tx - spot.x) * Math.min(1, dt * 12);
  spot.y += (spot.ty - spot.y) * Math.min(1, dt * 12);
  const baseR = Math.min(W, H) * 0.17;
  spot.r = baseR * (1 + 0.03 * Math.sin(t * 3));

  // 発見判定 + 明かしのイージング
  let found = 0;
  for (const it of items) {
    const inside = Math.hypot(it.x - spot.x, it.y - spot.y) < spot.r * 0.72;
    if (inside) it.found = true;
    const target = it.found ? 1 : (inside ? 1 : 0);
    it.reveal += (target - it.reveal) * Math.min(1, dt * (it.found ? 4 : 8));
    if (it.found) found++;
  }
  foundEl.textContent = found;

  // 1) 暗がりの下地
  ctx.fillStyle = rgba(C.dark, 1);
  ctx.fillRect(0, 0, W, H);

  // 2) 見つけたものは常に淡く発光(スポット外でも残る)
  for (const it of items) {
    if (it.reveal <= 0.01) continue;
    const bob = reduced ? 0 : Math.sin(t * 1.5 + it.ph) * 2;
    ctx.save(); ctx.translate(0, bob);
    // 発見済みは常時ほのかに、スポット内はさらに明るく
    const persist = it.found ? 0.32 : 0;
    const inSpot = Math.max(0, 1 - Math.hypot(it.x - spot.x, it.y - spot.y) / (spot.r * 0.95));
    const a = Math.min(1, persist + inSpot * 0.9) * it.reveal;
    drawShape(it, a, 0.85 + 0.15 * it.reveal);
    ctx.restore();
  }

  // 3) スポットライトの光(加算): 中心ほど明るいリング状のにじみ
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  const g = ctx.createRadialGradient(spot.x, spot.y, 0, spot.x, spot.y, spot.r);
  g.addColorStop(0, rgba(mix(C.accent, [255, 255, 255], 0.5), 0.16));
  g.addColorStop(0.6, rgba(C.accent, 0.06));
  g.addColorStop(1, rgba(C.accent, 0));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(spot.x, spot.y, spot.r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // 4) スポットの縁取り(細いリング)
  ctx.beginPath();
  ctx.strokeStyle = rgba(mix(C.accent, [255, 255, 255], 0.4), 0.35);
  ctx.lineWidth = 1.5;
  ctx.arc(spot.x, spot.y, spot.r * 0.72, 0, Math.PI * 2);
  ctx.stroke();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
