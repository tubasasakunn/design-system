<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="流れ場">
<meta name="pattern-desc" content="ノイズのベクトル場に沿って数千の粒子が流れ、残像フェードで筆致のような模様を描く。ポインタで場を乱せる。">
<title>流れ場</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif;
    background: var(--color-bg-primary); }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  .hint {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    font-size: .8rem; color: var(--color-fg-muted); letter-spacing: .04em;
    background: color-mix(in srgb, var(--color-bg-elevated) 65%, transparent);
    padding: .5rem 1rem; border-radius: 999px; pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="hint">ポインタで流れを乱す</div>
<script>
(() => {
"use strict";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");

const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
const hexRgb = (h) => { h=h.replace("#",""); if (h.length===3) h=h.replace(/./g,c=>c+c);
  const n=parseInt(h.slice(0,6),16); return [(n>>16)&255,(n>>8)&255,n&255]; };
const mix = (a,b,t) => [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
const rgba = (c,a) => `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;

const PAL = [[91,188,177],[188,178,232],[159,200,234],[240,168,189],[241,209,137]];
const C = {};
const refresh = () => {
  C.bg = hexRgb(token("--color-bg-primary", "#faf7f1"));
  C.acc = hexRgb(token("--color-accent-default", "#5bbcb1"));
  C.ink = hexRgb(token("--color-fg-primary", "#2c2a26"));
  C.needsClear = true;
};
refresh();
new MutationObserver(refresh).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme", "data-appearance"] });

let W=0, H=0, dpr=1;
const resize = () => { dpr=Math.min(2, window.devicePixelRatio||1); W=innerWidth; H=innerHeight;
  canvas.width=Math.round(W*dpr); canvas.height=Math.round(H*dpr); ctx.setTransform(dpr,0,0,dpr,0,0);
  C.needsClear = true; };
addEventListener("resize", resize); resize();

const rmq = matchMedia("(prefers-reduced-motion: reduce)");
let reduced = rmq.matches; rmq.addEventListener?.("change", e => reduced = e.matches);

const rand = (a,b) => a + Math.random()*(b-a);

// ---- 2D 値ノイズ（外部依存なしの勾配ノイズ）----
const perm = new Uint8Array(512);
(() => { const p = new Uint8Array(256); for (let i=0;i<256;i++) p[i]=i;
  for (let i=255;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=p[i]; p[i]=p[j]; p[j]=t; }
  for (let i=0;i<512;i++) perm[i]=p[i&255]; })();
const grads = [[1,0],[-1,0],[0,1],[0,-1],[0.707,0.707],[-0.707,0.707],[0.707,-0.707],[-0.707,-0.707]];
const fade = (t) => t*t*t*(t*(t*6-15)+10);
const lerp = (a,b,t) => a+(b-a)*t;
function noise2(x, y) {
  const X=Math.floor(x)&255, Y=Math.floor(y)&255;
  const xf=x-Math.floor(x), yf=y-Math.floor(y);
  const u=fade(xf), v=fade(yf);
  const g = (gx,gy,dx,dy) => { const g2=grads[perm[perm[gx]+gy]&7]; return g2[0]*dx+g2[1]*dy; };
  const n00=g(X,Y,xf,yf), n10=g(X+1,Y,xf-1,yf), n01=g(X,Y+1,xf,yf-1), n11=g(X+1,Y+1,xf-1,yf-1);
  return lerp(lerp(n00,n10,u), lerp(n01,n11,u), v);
}

// 場: ノイズから角度を得る。時間で緩やかに変化
const SCALE = 0.0016;      // 空間周波数
let flowT = 0;

// ポインタの乱れ（渦）
let pointer = { x:-999, y:-999, vx:0, px:0, py:0, active:false, strength:0 };
function onMove(e){ const r=canvas.getBoundingClientRect(); const nx=e.clientX-r.left, ny=e.clientY-r.top;
  pointer.vx = nx-pointer.x; pointer.x=nx; pointer.y=ny; pointer.active=true; pointer.strength=1; }
addEventListener("pointermove", onMove);
addEventListener("pointerdown", (e)=>{ onMove(e); pointer.strength=1.6; });
addEventListener("pointerleave", ()=>pointer.active=false);

// 粒子
const N = Math.min(2600, Math.round(W*H/520));
const px=new Float32Array(N), py=new Float32Array(N), pvx=new Float32Array(N), pvy=new Float32Array(N),
      plife=new Float32Array(N), pcol=new Int8Array(N), pw=new Float32Array(N);
function reseed(i){ px[i]=rand(0,W); py[i]=rand(0,H); pvx[i]=0; pvy[i]=0;
  plife[i]=rand(0, 260); pcol[i]=(Math.random()*PAL.length)|0; pw[i]=rand(0.6, 1.8); }
for (let i=0;i<N;i++) reseed(i);

function fieldAngle(x, y) {
  // 2オクターブで表情を出す
  let a = noise2(x*SCALE, y*SCALE + flowT) * Math.PI * 2.2;
  a += noise2(x*SCALE*2.3, y*SCALE*2.3 - flowT*0.7) * Math.PI * 0.8;
  return a;
}

let last = performance.now();
function frame(now) {
  let dt = (now-last)/1000; last = now; if (dt>0.05) dt=0.05;
  if (!reduced) flowT += dt * 0.05;

  // 残像フェード: 現在の bg を薄く重ねて筆致を残す
  if (C.needsClear) { ctx.fillStyle = rgba(C.bg, 1); ctx.fillRect(0,0,W,H); C.needsClear = false; }
  else { ctx.fillStyle = rgba(C.bg, reduced ? 1 : 0.055); ctx.fillRect(0,0,W,H); }

  pointer.strength *= Math.pow(0.9, dt*60);

  ctx.globalCompositeOperation = "source-over";
  for (let i=0;i<N;i++){
    let x=px[i], y=py[i];
    const ang = fieldAngle(x, y);
    let ax = Math.cos(ang), ay = Math.sin(ang);
    const spd = reduced ? 0 : 62;
    // ポインタの渦で場を乱す
    if (pointer.active && pointer.strength>0.02) {
      const dx=x-pointer.x, dy=y-pointer.y, d2=dx*dx+dy*dy;
      if (d2 < 42000) {
        const inv = 1/Math.sqrt(d2+1);
        const f = (1 - d2/42000) * pointer.strength;
        // 接線方向の渦 + 少しの発散
        ax += (-dy*inv)*f*2.4 + (dx*inv)*f*0.4;
        ay += ( dx*inv)*f*2.4 + (dy*inv)*f*0.4;
      }
    }
    const na = Math.atan2(ay, ax);
    const nx = x + Math.cos(na)*spd*dt*3;
    const ny = y + Math.sin(na)*spd*dt*3;

    // 筆致を線で
    const col = mix(PAL[pcol[i]], C.acc, 0.15);
    ctx.strokeStyle = rgba(col, 0.5);
    ctx.lineWidth = pw[i];
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(nx, ny); ctx.stroke();

    px[i]=nx; py[i]=ny;
    plife[i] -= dt*60;
    // 寿命切れ or 画面外で再配置
    if (plife[i] <= 0 || nx< -10 || nx>W+10 || ny< -10 || ny>H+10) reseed(i);
  }

  if (pointer.active) { pointer.active = pointer.strength > 0.05; }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
