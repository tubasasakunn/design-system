<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="四季の移ろい">
<meta name="pattern-desc" content="スクロールに合わせて空・フラクタルの木・舞う粒子が春夏秋冬へシームレスに遷移する一年の風景。">
<title>四季の移ろい</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
  }
  .track { height: 560vh; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  .season-labels {
    position: fixed; left: 7vw; top: 50%; transform: translateY(-50%);
    pointer-events: none;
  }
  .season-labels .name {
    position: absolute; left: 0; top: 0; transform: translateY(-50%);
    opacity: 0; white-space: nowrap;
  }
  .season-labels .kanji { font-size: clamp(56px, 11vw, 128px); font-weight: 200; letter-spacing: .1em; line-height: 1; }
  .season-labels .sub { margin-top: 14px; font-size: .82rem; letter-spacing: .34em; color: var(--color-fg-secondary); }
  .caption {
    position: fixed; left: 24px; bottom: 24px; max-width: 300px;
    padding: 14px 18px; border-radius: 20px;
    background: color-mix(in srgb, var(--color-bg-elevated) 76%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(10px); pointer-events: none;
  }
  .caption h1 { font-size: .95rem; font-weight: 600; letter-spacing: .04em; }
  .caption p { margin-top: 4px; font-size: .76rem; line-height: 1.6; color: var(--color-fg-muted); }
  .meter {
    position: fixed; right: 26px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 34vh; border-radius: 2px;
    background: var(--color-border-default); pointer-events: none;
  }
  .meter i { position: absolute; left: 0; top: 0; width: 100%; border-radius: 2px; background: var(--color-accent-default); }
</style>
</head>
<body>
<div class="track" aria-hidden="true"></div>
<canvas id="c"></canvas>
<div class="season-labels" id="labels"></div>
<div class="meter"><i id="meterFill" style="height:0%"></i></div>
<div class="caption">
  <h1>四季の移ろい</h1>
  <p>ゆっくりスクロールすると、一本の木のまわりで季節がめぐります。</p>
</div>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const rm = matchMedia("(prefers-reduced-motion: reduce)");

  // ---- デザイントークン（cream light をフォールバックに）----
  const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
  const hex = (h) => {
    h = h.replace("#", "");
    if (h.length === 3) h = h.split("").map((c) => c + c).join("");
    const n = parseInt(h.slice(0, 6), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  };
  const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
  const rgb = (c, a = 1) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`;
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  const smooth = (t) => t * t * (3 - 2 * t);

  // 季節の定義。空・地面・葉の色は生のパステルで持ち、描画時にテーマ背景と混ぜて馴染ませる
  const PASTEL = { pink: hex("#f0a8bd"), sky: hex("#9fc8ea"), yellow: hex("#f1d189"),
                   lav: hex("#bcb2e8"), coral: hex("#f3a890"), mint: hex("#a9dcc0"), teal: hex("#5bbcb1") };
  const SEASONS = [
    { kanji: "春", sub: "はる ｜ 花霞",   skyT: PASTEL.pink, skyB: PASTEL.yellow, ground: PASTEL.mint,  leaf: PASTEL.pink,  leaf2: hex("#fbe3ea"), foliage: 0.95 },
    { kanji: "夏", sub: "なつ ｜ 青嵐",   skyT: PASTEL.sky,  skyB: PASTEL.mint,   ground: PASTEL.teal,  leaf: PASTEL.teal,  leaf2: PASTEL.mint,    foliage: 1.0 },
    { kanji: "秋", sub: "あき ｜ 錦繍",   skyT: PASTEL.yellow, skyB: PASTEL.coral, ground: PASTEL.coral, leaf: PASTEL.coral, leaf2: PASTEL.yellow,  foliage: 0.9 },
    { kanji: "冬", sub: "ふゆ ｜ 銀世界", skyT: PASTEL.lav,  skyB: hex("#e8ecf2"), ground: hex("#f2f0ea"), leaf: hex("#e8ecf2"), leaf2: hex("#ffffff"), foliage: 0.06 },
  ];

  // 季節名ラベル（DOM）
  const labelWrap = document.getElementById("labels");
  const labelEls = SEASONS.map((s) => {
    const d = document.createElement("div");
    d.className = "name";
    d.innerHTML = `<div class="kanji">${s.kanji}</div><div class="sub">${s.sub}</div>`;
    labelWrap.appendChild(d);
    return d;
  });
  const meterFill = document.getElementById("meterFill");

  let COL = {};
  function readColors() {
    COL.bg = hex(token("--color-bg-primary", "#faf7f1"));
    COL.elev = hex(token("--color-bg-elevated", "#fffdf9"));
    COL.ink = hex(token("--color-fg-primary", "#2c2a26"));
    COL.deep = hex(token("--color-accent-fg", "#07312d"));
    COL.dark = (COL.bg[0] + COL.bg[1] + COL.bg[2]) / 3 < 128; // ダーク外観なら空を沈める
  }
  readColors();
  new MutationObserver(readColors).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme", "data-appearance"] });

  // ---- キャンバス ----
  let W = 0, H = 0, groundY = 0;
  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    groundY = H * 0.82;
    genTree();
  }

  // ---- フラクタルの木（決定的な擬似乱数で生成）----
  let segs = [], tips = [];
  function genTree() {
    let seed = 20260706;
    const rnd = () => ((seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296);
    segs = []; tips = [];
    const branch = (x, y, ang, len, w, depth) => {
      const x2 = x + Math.cos(ang) * len, y2 = y + Math.sin(ang) * len;
      segs.push({ x, y, x2, y2, w, depth });
      if (depth >= 6 || len < H * 0.018) { tips.push({ x: x2, y: y2, r: H * (0.02 + rnd() * 0.024), ph: rnd() * 6.28 }); return; }
      const n = depth < 2 ? 2 : (rnd() < 0.35 ? 3 : 2);
      for (let i = 0; i < n; i++) {
        const spread = (i / Math.max(1, n - 1) - 0.5) * (0.9 + rnd() * 0.5) + (rnd() - 0.5) * 0.25;
        branch(x2, y2, ang + spread, len * (0.66 + rnd() * 0.14), w * 0.62, depth + 1);
      }
    };
    branch(0, 0, -Math.PI / 2 + 0.04, H * 0.17, Math.max(5, H * 0.014), 0);
  }

  // ---- 粒子（花びら / 木漏れ日の粒 / 落ち葉 / 雪）----
  const N = 130;
  const parts = [];
  function respawn(p, weights, randomY) {
    let r = Math.random(), type = 0;
    for (let i = 0; i < 4; i++) { if (r < weights[i]) { type = i; break; } r -= weights[i]; }
    p.type = type;
    p.x = Math.random() * W;
    p.y = randomY ? Math.random() * H : (type === 1 ? H + 10 : -20 - Math.random() * 60);
    p.ph = Math.random() * 6.28;
    p.rot = Math.random() * 6.28;
    p.size = 2.4 + Math.random() * 3.4;
    p.vy = [26, -14, 52, 22][type] * (0.7 + Math.random() * 0.6);
    p.vx = (Math.random() - 0.5) * 12;
  }
  for (let i = 0; i < N; i++) { const p = {}; respawn(p, [1, 0, 0, 0], true); parts.push(p); }

  // ---- 雲（積雲クラスタを事前生成）----
  let cseed = 7;
  const crnd = () => ((cseed = (cseed * 1103515245 + 12345) >>> 0) / 4294967296);
  const clouds = Array.from({ length: 5 }, () => ({
    x: crnd(), y: 0.12 + crnd() * 0.24, s: 0.5 + crnd() * 0.9, v: 4 + crnd() * 6,
    puffs: Array.from({ length: 5 }, () => ({ dx: (crnd() - 0.5) * 130, dy: (crnd() - 0.5) * 26, r: 20 + crnd() * 26 })),
  }));

  // ---- スクロール → 季節の連続量 ----
  let progress = 0, shown = 0;
  const readScroll = () => {
    const max = document.documentElement.scrollHeight - innerHeight;
    progress = max > 0 ? clamp(scrollY / max, 0, 1) : 0;
  };
  addEventListener("scroll", readScroll, { passive: true });
  addEventListener("resize", () => { resize(); readScroll(); });
  resize(); readScroll();

  const lerpC = (a, b, t) => mix(a, b, t);
  const seasonAt = (p) => {
    const seg = clamp(p, 0, 1) * 3;
    const i = Math.min(2, Math.floor(seg));
    const t = smooth(seg - i);
    const A = SEASONS[i], B = SEASONS[i + 1];
    const weights = [0, 0, 0, 0];
    weights[i] = 1 - t; weights[i + 1] = t;
    return {
      weights,
      skyT: lerpC(A.skyT, B.skyT, t), skyB: lerpC(A.skyB, B.skyB, t),
      ground: lerpC(A.ground, B.ground, t),
      leaf: lerpC(A.leaf, B.leaf, t), leaf2: lerpC(A.leaf2, B.leaf2, t),
      foliage: A.foliage + (B.foliage - A.foliage) * t,
      winter: weights[3], summer: weights[1],
    };
  };

  let last = performance.now(), time = 0;
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000); last = now;
    shown += (progress - shown) * (1 - Math.exp(-dt * 6));
    if (!rm.matches) time += dt;
    const S = seasonAt(shown);

    // テーマ背景と混ぜて空を作る（ダーク外観では夜空寄りに沈む）
    const blend = COL.dark ? 0.28 : 0.5;
    const skyT = mix(COL.bg, S.skyT, blend), skyB = mix(COL.bg, S.skyB, blend * 0.9);
    const g = ctx.createLinearGradient(0, 0, 0, groundY);
    g.addColorStop(0, rgb(skyT)); g.addColorStop(1, rgb(skyB));
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, groundY + 2);

    // 太陽（冬は淡く小さく）
    const sunC = mix(COL.elev, S.skyB, 0.4);
    ctx.beginPath(); ctx.arc(W * 0.24, H * 0.22, 26 + S.summer * 10 - S.winter * 8, 0, 6.28);
    ctx.fillStyle = rgb(sunC, 0.85 - S.winter * 0.4); ctx.fill();

    // 雲：ふだんは薄雲、夏は入道雲がむくむくと立つ
    const cloudC = mix(COL.elev, skyT, COL.dark ? 0.5 : 0.25);
    for (const c of clouds) {
      const cx = ((c.x + time * c.v * 0.002) % 1.3 - 0.15) * W;
      const cy = c.y * H;
      ctx.fillStyle = rgb(cloudC, 0.5);
      for (const p of c.puffs) { ctx.beginPath(); ctx.arc(cx + p.dx * c.s, cy + p.dy * c.s, p.r * c.s * 0.8, 0, 6.28); ctx.fill(); }
    }
    if (S.summer > 0.02) { // 入道雲（円の積み上げ）
      const bx = W * 0.78, by = groundY - H * 0.03, a = S.summer;
      ctx.fillStyle = rgb(mix(COL.elev, PASTEL.sky, 0.12), 0.85 * a);
      const tower = [[0, 0, 90], [-70, -20, 60], [66, -26, 64], [-20, -70, 66], [30, -96, 52], [-4, -140, 40]];
      for (const [dx, dy, r] of tower) { ctx.beginPath(); ctx.arc(bx + dx, by + dy * (0.6 + a * 0.4), r * (0.5 + a * 0.5), 0, 6.28); ctx.fill(); }
    }

    // 遠景の丘と地面
    ctx.fillStyle = rgb(mix(COL.bg, S.ground, COL.dark ? 0.3 : 0.5), 0.55);
    ctx.beginPath(); ctx.moveTo(0, groundY);
    ctx.quadraticCurveTo(W * 0.3, groundY - H * 0.1, W * 0.62, groundY); ctx.lineTo(0, groundY); ctx.fill();
    ctx.fillStyle = rgb(mix(COL.bg, S.ground, COL.dark ? 0.34 : 0.62));
    ctx.beginPath(); ctx.moveTo(0, groundY);
    ctx.quadraticCurveTo(W * 0.5, groundY - 18, W, groundY + 8);
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

    // 木：風の揺れは深い枝ほど大きく
    const baseX = W * 0.68, baseY = groundY + 4;
    const sway = (d, ph) => Math.sin(time * 0.9 + d * 0.8 + ph) * d * 1.4 * (0.4 + S.summer * 0.8);
    ctx.lineCap = "round";
    const barkC = mix(COL.ink, COL.deep, 0.3);
    for (const s of segs) {
      ctx.strokeStyle = rgb(barkC, 0.92);
      ctx.lineWidth = s.w;
      ctx.beginPath();
      ctx.moveTo(baseX + s.x + sway(s.depth, 0), baseY + s.y);
      ctx.lineTo(baseX + s.x2 + sway(s.depth + 1, 0), baseY + s.y2);
      ctx.stroke();
      if (S.winter > 0.05 && s.depth < 4) { // 枝に積もる雪
        ctx.strokeStyle = rgb(COL.elev, S.winter * 0.9);
        ctx.lineWidth = Math.max(1, s.w * 0.45);
        ctx.beginPath();
        ctx.moveTo(baseX + s.x + sway(s.depth, 0), baseY + s.y - s.w * 0.5);
        ctx.lineTo(baseX + s.x2 + sway(s.depth + 1, 0), baseY + s.y2 - s.w * 0.5);
        ctx.stroke();
      }
    }
    // 葉むら：季節の色でにじむ（冬はほぼ裸木）
    for (const tp of tips) {
      const a = S.foliage;
      if (a < 0.02) continue;
      const x = baseX + tp.x + sway(7, tp.ph), y = baseY + tp.y;
      const wob = 1 + Math.sin(time * 1.3 + tp.ph) * 0.06;
      ctx.beginPath(); ctx.arc(x, y, tp.r * wob, 0, 6.28);
      ctx.fillStyle = rgb(S.leaf, 0.5 * a); ctx.fill();
      ctx.beginPath(); ctx.arc(x - tp.r * 0.3, y - tp.r * 0.34, tp.r * 0.62 * wob, 0, 6.28);
      ctx.fillStyle = rgb(S.leaf2, 0.55 * a); ctx.fill();
    }

    // 粒子：花びら↓ / 夏の光粒↑ / 落ち葉↓（回転）/ 雪↓
    if (!rm.matches) {
      for (const p of parts) {
        p.ph += dt * 2;
        if (p.type === 0) { p.x += (p.vx + Math.sin(p.ph) * 26) * dt; p.y += p.vy * dt; p.rot += dt * 2.4; }
        else if (p.type === 1) { p.x += Math.sin(p.ph * 0.7) * 8 * dt; p.y += p.vy * dt; }
        else if (p.type === 2) { p.x += (p.vx + Math.sin(p.ph * 1.4) * 34) * dt; p.y += p.vy * dt; p.rot += dt * 4.2; }
        else { p.x += (p.vx * 0.4 + Math.sin(p.ph * 0.6) * 10) * dt; p.y += p.vy * dt; }
        if (p.y > H + 30 || p.y < -80 || p.x < -40 || p.x > W + 40) respawn(p, S.weights, false);
        drawPart(p, S);
      }
    } else {
      for (const p of parts) drawPart(p, S); // 静止画として散らす
    }

    // ラベルの不透明度
    for (let i = 0; i < 4; i++) labelEls[i].style.opacity = smooth(S.weights[i]).toFixed(3);
    meterFill.style.height = (shown * 100).toFixed(1) + "%";
    requestAnimationFrame(frame);
  }

  function drawPart(p, S) {
    ctx.save(); ctx.translate(p.x, p.y);
    if (p.type === 0) { // 花びら
      ctx.rotate(p.rot);
      ctx.fillStyle = rgb(PASTEL.pink, 0.8);
      ctx.beginPath(); ctx.ellipse(0, 0, p.size * 1.5, p.size * 0.9, 0, 0, 6.28); ctx.fill();
    } else if (p.type === 1) { // 夏のきらめき
      ctx.fillStyle = rgb(mix(COL.elev, PASTEL.mint, 0.4), 0.5 + Math.sin(p.ph * 3) * 0.25);
      ctx.beginPath(); ctx.arc(0, 0, p.size * 0.55, 0, 6.28); ctx.fill();
    } else if (p.type === 2) { // 落ち葉
      ctx.rotate(p.rot);
      ctx.fillStyle = rgb(Math.sin(p.ph) > 0 ? PASTEL.coral : PASTEL.yellow, 0.85);
      ctx.beginPath();
      ctx.moveTo(0, -p.size * 1.6);
      ctx.quadraticCurveTo(p.size * 1.5, 0, 0, p.size * 1.6);
      ctx.quadraticCurveTo(-p.size * 1.5, 0, 0, -p.size * 1.6);
      ctx.fill();
    } else { // 雪
      ctx.fillStyle = rgb(COL.elev, 0.9);
      ctx.beginPath(); ctx.arc(0, 0, p.size * 0.7, 0, 6.28); ctx.fill();
    }
    ctx.restore();
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
