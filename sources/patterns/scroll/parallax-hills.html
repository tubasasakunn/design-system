<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="多層の丘">
<meta name="pattern-desc" content="速度差パララックスで雲・遠山・丘・前景の草が別々の速さで動き、スクロールに奥行きが生まれる。">
<title>多層の丘</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
  }
  .track { height: 460vh; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  .caption {
    position: fixed; left: 24px; bottom: 24px; max-width: 280px; z-index: 3;
    padding: 14px 18px; border-radius: 20px; pointer-events: none;
    background: color-mix(in srgb, var(--color-bg-elevated) 76%, transparent);
    border: 1px solid var(--color-border-default); backdrop-filter: blur(10px);
  }
  .caption h1 { font-size: .95rem; font-weight: 600; letter-spacing: .04em; }
  .caption p { margin-top: 4px; font-size: .76rem; line-height: 1.6; color: var(--color-fg-muted); }
  .depthmeter {
    position: fixed; right: 26px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 34vh; border-radius: 2px; z-index: 3;
    background: var(--color-border-default); pointer-events: none;
  }
  .depthmeter i { position: absolute; left: 0; top: 0; width: 100%; border-radius: 2px; background: var(--color-accent-default); height: 0; }
</style>
</head>
<body>
<div class="track" aria-hidden="true"></div>
<canvas id="c"></canvas>
<div class="depthmeter"><i id="dfill"></i></div>
<div class="caption">
  <h1>多層の丘</h1>
  <p>スクロールすると、雲・遠山・丘・草が別々の速さで流れ、奥行きが立ちあがります。</p>
</div>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const rm = matchMedia("(prefers-reduced-motion: reduce)");
  const dfill = document.getElementById("dfill");

  const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
  const hex = (h) => { h = h.replace("#", ""); if (h.length === 3) h = h.split("").map((c) => c + c).join("");
    const n = parseInt(h.slice(0, 6), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; };
  const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
  const rgb = (c, a = 1) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`;
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

  const PASTEL = { teal: hex("#5bbcb1"), sky: hex("#9fc8ea"), mint: hex("#a9dcc0"),
                   lav: hex("#bcb2e8"), yellow: hex("#f1d189"), pink: hex("#f0a8bd") };

  let COL = {};
  function readColors() {
    COL.bg = hex(token("--color-bg-primary", "#faf7f1"));
    COL.sec = hex(token("--color-bg-secondary", "#f1ece2"));
    COL.elev = hex(token("--color-bg-elevated", "#fffdf9"));
    COL.ink = hex(token("--color-fg-primary", "#2c2a26"));
    COL.deep = hex(token("--color-accent-fg", "#07312d"));
    COL.acc = hex(token("--color-accent-default", "#5bbcb1"));
    COL.dark = (COL.bg[0] + COL.bg[1] + COL.bg[2]) / 3 < 128;
  }
  readColors();
  new MutationObserver(readColors).observe(document.documentElement,
    { attributes: true, attributeFilter: ["data-theme", "data-appearance"] });

  let W = 0, H = 0;
  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // 山なみを1本の連続曲線として決定的に生成（複数正弦の重ね合わせ = 擬似丘陵）
  function ridge(x, seed, amp, freq) {
    // 3 波の合成。seed で位相をずらして層ごとに別の稜線にする
    return Math.sin(x * freq + seed) * amp
         + Math.sin(x * freq * 2.3 + seed * 1.7) * amp * 0.34
         + Math.sin(x * freq * 0.55 + seed * 0.6) * amp * 0.55;
  }

  // 層定義：speed=スクロール追従係数（奥ほど小さい）、baseY=地平割合、amp/freq=稜線、tint=丘の色寄せ、drift=idle 横流れ
  const LAYERS = [
    { key: "far",  speed: 0.10, baseY: 0.50, amp: 26, freq: 0.006, tintP: "lav",  tint: 0.32, alpha: 0.60, drift: 3 },
    { key: "mid",  speed: 0.20, baseY: 0.62, amp: 40, freq: 0.008, tintP: "mint", tint: 0.42, alpha: 0.78, drift: 6 },
    { key: "hill", speed: 0.36, baseY: 0.74, amp: 58, freq: 0.010, tintP: "teal", tint: 0.50, alpha: 0.90, drift: 10 },
    { key: "near", speed: 0.60, baseY: 0.88, amp: 74, freq: 0.013, tintP: "teal", tint: 0.66, alpha: 1.00, drift: 16 },
  ];

  // 雲：事前生成（横位置・高さ・大きさ・速さ・パフ）
  let cseed = 91;
  const crnd = () => ((cseed = (cseed * 1103515245 + 12345) >>> 0) / 4294967296);
  const clouds = Array.from({ length: 6 }, () => ({
    x: crnd(), y: 0.08 + crnd() * 0.22, s: 0.55 + crnd() * 0.95, spd: 0.05 + crnd() * 0.12, v: 3 + crnd() * 5,
    puffs: Array.from({ length: 4 }, () => ({ dx: (crnd() - 0.5) * 120, dy: (crnd() - 0.5) * 22, r: 18 + crnd() * 24 })),
  }));

  // 前景の草：手前の縁に並ぶ刃。風で揺れる
  let gseed = 17;
  const grnd = () => ((gseed = (gseed * 1664525 + 1013904223) >>> 0) / 4294967296);
  const blades = Array.from({ length: 90 }, () => ({
    x: grnd(), h: 0.10 + grnd() * 0.16, w: 3 + grnd() * 4, lean: (grnd() - 0.5) * 0.4, ph: grnd() * 6.28, tone: grnd() }));

  let progress = 0;
  const readScroll = () => {
    const max = document.documentElement.scrollHeight - innerHeight;
    progress = max > 0 ? clamp(scrollY / max, 0, 1) : 0;
  };
  addEventListener("scroll", readScroll, { passive: true });
  addEventListener("resize", () => { resize(); readScroll(); });
  resize(); readScroll();

  function fillRidge(baseY, seed, amp, freq, shiftX, color, alpha) {
    ctx.beginPath();
    ctx.moveTo(0, H);
    const step = 8;
    for (let x = -step; x <= W + step; x += step) {
      const y = baseY + ridge(x + shiftX, seed, amp, freq);
      if (x === -step) ctx.lineTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.lineTo(W + step, H); ctx.closePath();
    ctx.fillStyle = rgb(color, alpha); ctx.fill();
  }

  let last = performance.now(), time = 0, shown = 0;
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000); last = now;
    if (!rm.matches) time += dt;
    shown += (progress - shown) * (1 - Math.exp(-dt * 6));

    // 空グラデーション（テーマ背景と淡いパステルを混ぜる）
    const blend = COL.dark ? 0.22 : 0.42;
    const top = mix(COL.bg, PASTEL.sky, blend * 0.7);
    const bot = mix(COL.bg, PASTEL.mint, blend * 0.4);
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, rgb(top)); g.addColorStop(1, rgb(bot));
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // 太陽（ごく淡く）
    ctx.beginPath(); ctx.arc(W * 0.78, H * 0.20, 40, 0, 6.28);
    ctx.fillStyle = rgb(mix(COL.elev, PASTEL.yellow, 0.5), COL.dark ? 0.25 : 0.55); ctx.fill();

    // 雲：奥の層なのでゆっくり。パララックスは弱め
    const cloudC = mix(COL.elev, top, COL.dark ? 0.4 : 0.2);
    for (const c of clouds) {
      const px = (c.x - shown * c.spd + time * c.v * 0.0015) % 1.3;
      const cx = ((px + 1.3) % 1.3 - 0.15) * W;
      const cy = c.y * H;
      ctx.fillStyle = rgb(cloudC, COL.dark ? 0.35 : 0.55);
      for (const p of c.puffs) { ctx.beginPath(); ctx.arc(cx + p.dx * c.s, cy + p.dy * c.s, p.r * c.s * 0.8, 0, 6.28); ctx.fill(); }
    }

    // 丘の層：speed に応じてスクロールで上下＋横に流れる（奥ほど遅い＝速度差パララックス）
    for (const L of LAYERS) {
      const parY = shown * L.speed * H * 0.9;        // 縦パララックス（せり上がる地平）
      const shiftX = shown * L.speed * W * 1.4 + (rm.matches ? 0 : time * L.drift); // 横スクロール流れ＋idle風
      const baseY = H * L.baseY - H * 0.18 + parY;
      const tone = COL.dark ? 0.34 : 0.5;
      const color = mix(mix(COL.bg, COL.ink, tone * 0.4), PASTEL[L.tintP], L.tint);
      fillRidge(baseY, L.freq * 1000 + 3.1, L.amp, L.freq, shiftX, color, L.alpha);
    }

    // 前景の草：最速パララックス。手前の縁で風に揺れる
    const grassBase = H * 1.02 + shown * 0.7 * H * 0.9;
    const grassC = mix(mix(COL.bg, COL.ink, COL.dark ? 0.5 : 0.6), PASTEL.teal, 0.5);
    for (const b of blades) {
      const gx = ((b.x - shown * 0.9) % 1 + 1) % 1 * (W + 40) - 20;
      const h = b.h * H;
      const bx = grassBase;
      const sway = rm.matches ? 0 : Math.sin(time * 1.6 + b.ph) * 0.16;
      const tipX = gx + (b.lean + sway) * h;
      ctx.beginPath();
      ctx.moveTo(gx - b.w, bx);
      ctx.quadraticCurveTo(gx + (b.lean + sway) * h * 0.5, bx - h * 0.6, tipX, bx - h);
      ctx.quadraticCurveTo(gx + (b.lean + sway) * h * 0.5, bx - h * 0.6, gx + b.w, bx);
      ctx.closePath();
      ctx.fillStyle = rgb(mix(grassC, PASTEL.mint, b.tone * 0.4), 0.92); ctx.fill();
    }

    dfill.style.height = (shown * 100).toFixed(1) + "%";
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
