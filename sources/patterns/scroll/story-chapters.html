<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="シネマ章送り">
<meta name="pattern-desc" content="スクロールで章が送られ、夜明けから船出・嵐・凪・灯へと図形のシーンがクロスフェードで移ろう物語。">
<title>シネマ章送り</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
  }
  .track { height: 500vh; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* 上部の進捗バー */
  .topbar { position: fixed; left: 0; top: 0; width: 100%; height: 3px; z-index: 5; background: color-mix(in srgb, var(--color-border-default) 60%, transparent); pointer-events: none; }
  .topbar i { display: block; height: 100%; width: 0; background: var(--color-accent-default); border-radius: 0 2px 2px 0; }

  /* 章タイトル（クロスフェード） */
  .titles { position: fixed; left: 8vw; top: 50%; transform: translateY(-50%); pointer-events: none; z-index: 4; }
  .titles .chap { position: absolute; left: 0; top: 0; transform: translateY(-50%); opacity: 0; white-space: nowrap; will-change: opacity, transform; }
  .titles .no { font-size: .74rem; letter-spacing: .42em; color: var(--color-accent-default); font-weight: 600; }
  .titles .ttl { margin-top: 10px; font-size: clamp(38px, 8vw, 92px); font-weight: 200; letter-spacing: .06em; line-height: 1; }
  .titles .sub { margin-top: 14px; font-size: .82rem; letter-spacing: .12em; color: var(--color-fg-secondary); max-width: 62vw; line-height: 1.7; }

  /* 章インジケータ（右） */
  .dots { position: fixed; right: 28px; top: 50%; transform: translateY(-50%); z-index: 4; display: flex; flex-direction: column; gap: 16px; pointer-events: none; }
  .dots b { display: block; width: 9px; height: 9px; border-radius: 50%; background: var(--color-border-strong); transition: transform .4s cubic-bezier(.4,0,.2,1), background .4s; }
  .dots b.on { background: var(--color-accent-default); transform: scale(1.5); }

  .hint { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); font-size: .74rem; letter-spacing: .2em; color: var(--color-fg-muted); z-index: 4; pointer-events: none; }
  .hint.hide { opacity: 0; transition: opacity .6s; }
</style>
</head>
<body>
<div class="track" aria-hidden="true"></div>
<canvas id="c"></canvas>
<div class="topbar"><i id="bar"></i></div>
<div class="titles" id="titles"></div>
<div class="dots" id="dots"></div>
<div class="hint" id="hint">スクロールで章が進みます</div>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const rm = matchMedia("(prefers-reduced-motion: reduce)");

  const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
  const hex = (h) => { h = h.replace("#", ""); if (h.length === 3) h = h.split("").map((c) => c + c).join(""); const n = parseInt(h.slice(0, 6), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; };
  const mix = (a, b, t) => [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
  const rgb = (c, a = 1) => `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`;
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  const smooth = (t) => { t = clamp(t, 0, 1); return t * t * (3 - 2 * t); };
  const ease = (t) => 1 - Math.pow(1 - clamp(t, 0, 1), 3);

  const PASTEL = { pink: hex("#f0a8bd"), sky: hex("#9fc8ea"), yellow: hex("#f1d189"), lav: hex("#bcb2e8"), coral: hex("#f3a890"), mint: hex("#a9dcc0"), teal: hex("#5bbcb1") };

  let COL = {};
  function readColors() {
    COL.bg = hex(token("--color-bg-primary", "#faf7f1"));
    COL.sec = hex(token("--color-bg-secondary", "#f1ece2"));
    COL.elev = hex(token("--color-bg-elevated", "#fffdf9"));
    COL.ink = hex(token("--color-fg-primary", "#2c2a26"));
    COL.fg2 = hex(token("--color-fg-secondary", "#6c655b"));
    COL.acc = hex(token("--color-accent-default", "#5bbcb1"));
    COL.deep = hex(token("--color-accent-fg", "#07312d"));
    COL.dark = (COL.bg[0] + COL.bg[1] + COL.bg[2]) / 3 < 128;
  }
  readColors();
  new MutationObserver(readColors).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme", "data-appearance"] });

  // ---- 章の定義 ----
  const CH = [
    { no: "序章", ttl: "夜明け", sub: "水平線の下から光が満ちて、物語がはじまる。", tint: PASTEL.pink },
    { no: "第一章", ttl: "船出", sub: "小さな帆が、まだ見ぬ沖へと滑り出す。", tint: PASTEL.sky },
    { no: "第二章", ttl: "嵐", sub: "斜めの雨と閃光。舟は波間に大きく傾ぐ。", tint: PASTEL.lav },
    { no: "第三章", ttl: "凪", sub: "波は静まり、水面に一つの星がゆれる。", tint: PASTEL.mint },
    { no: "終章", ttl: "灯", sub: "岬の灯がまわり、散らばった星が形を結ぶ。", tint: PASTEL.yellow },
  ];
  const N = CH.length;

  const titlesWrap = document.getElementById("titles");
  const titleEls = CH.map((c) => {
    const d = document.createElement("div"); d.className = "chap";
    d.innerHTML = `<div class="no">${c.no}</div><div class="ttl">${c.ttl}</div><div class="sub">${c.sub}</div>`;
    titlesWrap.appendChild(d); return d;
  });
  const dotsWrap = document.getElementById("dots");
  const dotEls = CH.map(() => { const b = document.createElement("b"); dotsWrap.appendChild(b); return b; });
  const bar = document.getElementById("bar");
  const hint = document.getElementById("hint");

  // ---- キャンバス ----
  let W = 0, H = 0;
  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  let progress = 0, pos = 0, shownPos = 0;
  const readScroll = () => {
    const max = document.documentElement.scrollHeight - innerHeight;
    progress = max > 0 ? clamp(scrollY / max, 0, 1) : 0;
    pos = progress * (N - 1);
    if (progress > 0.02) hint.classList.add("hide");
  };
  addEventListener("scroll", readScroll, { passive: true });
  addEventListener("resize", () => { resize(); readScroll(); });
  resize(); readScroll();

  // 背景（テーマ background と章 tint を混ぜた空〜海のグラデ）
  function background(tint) {
    const blend = COL.dark ? 0.22 : 0.42;
    const top = mix(COL.bg, tint, blend);
    const bot = mix(COL.sec, tint, blend * 0.5);
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, rgb(top)); g.addColorStop(0.62, rgb(mix(top, bot, 0.6))); g.addColorStop(1, rgb(bot));
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  const seaY = () => H * 0.66;
  function waveY(x, t, amp, k, ph) { return seaY() + Math.sin(x * k + t + ph) * amp + Math.sin(x * k * 2.3 + t * 1.4) * amp * 0.34; }
  function drawSea(t, amp, alpha, tint) {
    ctx.beginPath(); ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 8) ctx.lineTo(x, waveY(x, t, amp, 0.012, 0));
    ctx.lineTo(W, H); ctx.closePath();
    const g = ctx.createLinearGradient(0, seaY() - amp, 0, H);
    g.addColorStop(0, rgb(mix(COL.sec, tint, COL.dark ? 0.2 : 0.35), alpha));
    g.addColorStop(1, rgb(mix(COL.deep, tint, 0.2), alpha * (COL.dark ? 0.8 : 0.55)));
    ctx.fillStyle = g; ctx.fill();
  }

  // ---- 各章のシーン。lp: 章内進行 0..1, a: クロスフェード alpha ----
  const scenes = [
    // 0 夜明け
    (lp, a, t) => {
      background(CH[0].tint);
      const sunR = H * 0.11;
      const rise = ease(lp);                       // 太陽が水平線から昇る
      const sy = seaY() + sunR * 1.3 - rise * (H * 0.42);
      const sx = W * 0.5;
      // 光のリング
      for (let i = 0; i < 4; i++) {
        const rr = sunR * (1.5 + i * 1.1) + (t * 20 + i * 40) % 120;
        ctx.beginPath(); ctx.arc(sx, sy, rr, 0, 6.28);
        ctx.strokeStyle = rgb(mix(COL.elev, PASTEL.yellow, 0.5), a * 0.12 * (1 - i / 4)); ctx.lineWidth = 2; ctx.stroke();
      }
      const gg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sunR * 3.2);
      gg.addColorStop(0, rgb(mix(COL.elev, PASTEL.yellow, 0.6), a * 0.9));
      gg.addColorStop(0.3, rgb(mix(PASTEL.yellow, PASTEL.pink, 0.4), a * 0.55));
      gg.addColorStop(1, rgb(PASTEL.pink, 0));
      ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(sx, sy, sunR * 3.2, 0, 6.28); ctx.fill();
      ctx.fillStyle = rgb(mix(COL.elev, PASTEL.yellow, 0.7), a);
      ctx.beginPath(); ctx.arc(sx, sy, sunR, 0, 6.28); ctx.fill();
      drawSea(t, 6, a, CH[0].tint);
      // 水面の光の帯
      ctx.save(); ctx.globalAlpha = a * 0.5 * rise;
      for (let y = seaY(); y < H; y += 14) {
        const w = (H - y) / (H - seaY());
        ctx.fillStyle = rgb(mix(COL.elev, PASTEL.yellow, 0.5), 0.5 * w);
        const ww = sunR * (0.6 + (1 - w) * 3) * (0.9 + Math.sin(y * 0.3 + t * 2) * 0.15);
        ctx.fillRect(sx - ww / 2, y, ww, 4);
      }
      ctx.restore();
    },
    // 1 船出
    (lp, a, t) => {
      background(CH[1].tint);
      // 遠くの太陽の名残
      ctx.fillStyle = rgb(mix(COL.elev, PASTEL.yellow, 0.5), a * 0.4);
      ctx.beginPath(); ctx.arc(W * 0.5, H * 0.24, H * 0.07, 0, 6.28); ctx.fill();
      drawSea(t, 8, a, CH[1].tint);
      // 舟：左から右へ滑り出す
      const bx = W * (0.16 + ease(lp) * 0.6);
      const by = waveY(bx, t, 8, 0.012, 0) - 4;
      const tilt = Math.cos(bx * 0.012 + t) * 0.05;
      drawBoat(bx, by, tilt, H * 0.05, a, CH[1].tint);
      // 航跡
      ctx.strokeStyle = rgb(mix(COL.elev, CH[1].tint, 0.3), a * 0.4); ctx.lineWidth = 2;
      for (let i = 1; i < 5; i++) {
        const wx = bx - i * 26, wy = waveY(wx, t, 8, 0.012, 0);
        ctx.beginPath(); ctx.arc(wx, wy, i * 5, 0.2, Math.PI - 0.2); ctx.stroke();
      }
    },
    // 2 嵐
    (lp, a, t) => {
      background(CH[2].tint);
      // 稲光（時間ノイズで稀に）
      const flick = Math.max(0, Math.sin(t * 5.1) * Math.sin(t * 1.7) - 0.82) * 6;
      if (flick > 0 && !rm.matches) { ctx.fillStyle = rgb(mix(COL.elev, PASTEL.lav, 0.3), Math.min(0.5, flick) * a); ctx.fillRect(0, 0, W, H); }
      drawSea(t * 2.2, 22 + ease(lp) * 14, a, CH[2].tint);
      // 斜めの雨
      if (!rm.matches || true) {
        ctx.strokeStyle = rgb(mix(COL.fg2, PASTEL.lav, 0.4), a * 0.28); ctx.lineWidth = 1.4;
        const off = (t * 900) % 40;
        for (let i = -20; i < W / 20 + 20; i++) {
          const x = i * 20 + off, y0 = (i * 57 + off * 3) % H;
          ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x - 12, y0 + 26); ctx.stroke();
        }
      }
      // 大きく傾ぐ舟
      const bx = W * 0.5 + Math.sin(t * 0.9) * W * 0.06;
      const by = waveY(bx, t * 2.2, 22 + ease(lp) * 14, 0.012, 0) - 6;
      const tilt = Math.sin(t * 1.4) * (0.16 + ease(lp) * 0.12);
      drawBoat(bx, by, tilt, H * 0.05, a, CH[2].tint);
    },
    // 3 凪
    (lp, a, t) => {
      background(CH[3].tint);
      // 静かな星と月
      ctx.fillStyle = rgb(mix(COL.elev, PASTEL.mint, 0.4), a * 0.8);
      ctx.beginPath(); ctx.arc(W * 0.5, H * 0.26, H * 0.05, 0, 6.28); ctx.fill();
      drawSea(t * 0.4, 3, a, CH[3].tint);
      // 広がる波紋（凪いだ水面に落ちる雫）
      const cx = W * 0.5, cy = seaY() + H * 0.12;
      for (let i = 0; i < 4; i++) {
        const ph = (t * 0.4 + i / 4) % 1;
        const rr = ph * Math.min(W, H) * 0.4;
        ctx.beginPath(); ctx.ellipse(cx, cy, rr, rr * 0.34, 0, 0, 6.28);
        ctx.strokeStyle = rgb(mix(COL.elev, PASTEL.mint, 0.4), a * (1 - ph) * 0.5); ctx.lineWidth = 1.6; ctx.stroke();
      }
      // 星の反射（ゆらぎ）
      ctx.save(); ctx.globalAlpha = a * 0.6;
      for (let y = seaY() + 6; y < H; y += 10) {
        const sway = Math.sin(y * 0.2 + t) * 6;
        ctx.fillStyle = rgb(mix(COL.elev, PASTEL.mint, 0.4), 0.4 * (1 - (y - seaY()) / (H - seaY())));
        ctx.beginPath(); ctx.arc(cx - H * 0.24 + sway, y, 2.2, 0, 6.28); ctx.fill();
      }
      ctx.restore();
    },
    // 4 灯
    (lp, a, t) => {
      background(CH[4].tint);
      drawSea(t * 0.6, 6, a, CH[4].tint);
      // 岬の灯台と回る光
      const lx = W * 0.78, ly = seaY() - 4;
      const beam = (t * 0.8) % 6.283;
      ctx.save(); ctx.translate(lx, ly - H * 0.16);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, W * 0.9);
      grad.addColorStop(0, rgb(mix(COL.elev, PASTEL.yellow, 0.6), a * 0.5));
      grad.addColorStop(1, rgb(PASTEL.yellow, 0));
      ctx.rotate(Math.sin(beam) * 0.5);
      ctx.fillStyle = grad; ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.lineTo(-W, -W * 0.28); ctx.lineTo(-W, W * 0.28); ctx.closePath(); ctx.fill();
      ctx.restore();
      // 灯台本体
      ctx.fillStyle = rgb(mix(COL.ink, CH[4].tint, 0.2), a);
      ctx.beginPath(); ctx.moveTo(lx - 8, ly); ctx.lineTo(lx - 5, ly - H * 0.16); ctx.lineTo(lx + 5, ly - H * 0.16); ctx.lineTo(lx + 8, ly); ctx.closePath(); ctx.fill();
      ctx.fillStyle = rgb(mix(COL.elev, PASTEL.yellow, 0.7), a);
      ctx.beginPath(); ctx.arc(lx, ly - H * 0.16, 6, 0, 6.28); ctx.fill();
      // 星座（散らばった点が線で結ばれる）
      const pts = [[0.2, 0.2], [0.32, 0.14], [0.44, 0.24], [0.5, 0.16], [0.38, 0.32]].map(([px, py]) => [px * W, py * H]);
      const link = ease(lp);
      ctx.strokeStyle = rgb(mix(COL.elev, PASTEL.yellow, 0.5), a * 0.5 * link); ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < pts.length - 1; i++) {
        const seg = clamp(link * (pts.length - 1) - i, 0, 1);
        if (seg <= 0) break;
        ctx.moveTo(pts[i][0], pts[i][1]);
        ctx.lineTo(pts[i][0] + (pts[i + 1][0] - pts[i][0]) * seg, pts[i][1] + (pts[i + 1][1] - pts[i][1]) * seg);
      }
      ctx.stroke();
      for (const [px, py] of pts) { ctx.fillStyle = rgb(mix(COL.elev, PASTEL.yellow, 0.6), a * (0.5 + 0.5 * link)); ctx.beginPath(); ctx.arc(px, py, 2.6, 0, 6.28); ctx.fill(); }
    },
  ];

  function drawBoat(x, y, tilt, size, a, tint) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(tilt);
    // 船体
    ctx.fillStyle = rgb(mix(COL.ink, tint, 0.25), a);
    ctx.beginPath(); ctx.moveTo(-size, 0); ctx.quadraticCurveTo(0, size * 0.7, size, 0); ctx.lineTo(size * 0.7, -size * 0.16); ctx.lineTo(-size * 0.7, -size * 0.16); ctx.closePath(); ctx.fill();
    // 帆
    ctx.fillStyle = rgb(mix(COL.elev, tint, 0.3), a);
    ctx.beginPath(); ctx.moveTo(0, -size * 0.16); ctx.lineTo(0, -size * 1.9); ctx.quadraticCurveTo(size * 0.9, -size * 1.0, size * 0.1, -size * 0.16); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = rgb(mix(COL.ink, tint, 0.3), a); ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(0, -size * 0.16); ctx.lineTo(0, -size * 1.95); ctx.stroke();
    ctx.restore();
  }

  let last = performance.now(), time = 0;
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000); last = now;
    shownPos += (pos - shownPos) * (1 - Math.exp(-dt * 7));
    if (!rm.matches) time += dt;

    ctx.clearRect(0, 0, W, H);
    const index = Math.min(N - 1, Math.floor(shownPos));
    const frac = shownPos - index;
    const draw = (i, alpha) => { if (i < 0 || i >= N || alpha <= 0.001) return; const lp = clamp(shownPos - i + 0.5, 0, 1); scenes[i](lp, alpha, time); };
    // クロスフェード（現在→次）
    draw(index, 1 - smooth(frac));
    if (index + 1 < N) draw(index + 1, smooth(frac));

    // タイトル・ドット・バー
    for (let i = 0; i < N; i++) {
      const w = clamp(1 - Math.abs(shownPos - i), 0, 1);
      const el = titleEls[i];
      el.style.opacity = smooth(w).toFixed(3);
      el.style.transform = `translateY(calc(-50% + ${(1 - w) * 18 * (shownPos > i ? -1 : 1)}px))`;
      dotEls[i].classList.toggle("on", Math.round(shownPos) === i);
    }
    bar.style.width = (progress * 100).toFixed(2) + "%";
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
