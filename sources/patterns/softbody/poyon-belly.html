<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="ぽよぽよのおなか">
<meta name="pattern-desc" content="円周ばねと内圧で膨らむソフトボディ。撫でたりつついたりするとぽよんと揺れて丸へ戻る、猫のおなか。">
<title>ぽよぽよのおなか</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    height: 100dvh;
  }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  .caption {
    position: fixed; left: 24px; bottom: 24px; max-width: 300px;
    padding: 14px 18px; border-radius: 20px;
    background: color-mix(in srgb, var(--color-bg-elevated) 78%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(10px);
    pointer-events: none;
  }
  .caption h1 { font-size: .95rem; font-weight: 600; letter-spacing: .04em; }
  .caption p { margin-top: 4px; font-size: .76rem; line-height: 1.6; color: var(--color-fg-muted); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="caption">
  <h1>ぽよぽよのおなか</h1>
  <p>撫でる・つつくと、円周ばねと内側の圧力でぽよんぽよんと揺れて、やがて丸いおなかへ戻ります。</p>
</div>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const rm = matchMedia("(prefers-reduced-motion: reduce)");

  // ---- デザイントークン（cream light をフォールバック）----
  const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
  let C = {};
  function readColors() {
    C = {
      bg:      token("--color-bg-primary", "#faf7f1"),
      belly:   token("--color-accent-default", "#5bbcb1"),
      bellyHi: token("--color-bg-elevated", "#fffdf9"),
      ink:     token("--color-fg-primary", "#2c2a26"),
      muted:   token("--color-fg-muted", "#a79f91"),
      accentFg:token("--color-accent-fg", "#07312d"),
      border:  token("--color-border-strong", "#ddd5c6"),
    };
  }
  const mixHex = (a, b, t) => {
    const p = (h) => { h = h.replace("#",""); if (h.length===3) h=h.split("").map(c=>c+c).join(""); const n=parseInt(h.slice(0,6),16); return [(n>>16)&255,(n>>8)&255,n&255]; };
    const A = p(a), B = p(b);
    return `rgb(${Math.round(A[0]+(B[0]-A[0])*t)},${Math.round(A[1]+(B[1]-A[1])*t)},${Math.round(A[2]+(B[2]-A[2])*t)})`;
  };

  // ---- ソフトボディ（円周の質点 + 隣接ばね + 内圧）----
  const N = 44;                 // 円周の質点数
  const pts = [];               // {x,y, px,py, ox,oy}  ox,oy = 中立位置(相対)
  let cx = 0, cy = 0, R = 0;    // 中心と半径
  let restLen = 0, restArea = 0;

  const K_EDGE = 340;           // 円周ばね定数
  const K_HOME = 26;            // 中立形状へ戻す弱いばね
  const PRESSURE = 1.05;        // 内圧の基準倍率
  const DAMP = 3.1;             // 速度減衰

  function buildBody() {
    const s = Math.min(innerWidth, innerHeight);
    R = Math.max(70, s * 0.26);
    cx = innerWidth / 2;
    cy = innerHeight / 2 + R * 0.08;
    pts.length = 0;
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2 - Math.PI / 2;
      // 少し縦長の卵形シルエット（おなからしさ）
      const ox = Math.cos(a) * R * 1.02;
      const oy = Math.sin(a) * R * 1.12;
      pts.push({ x: cx + ox, y: cy + oy, px: cx + ox, py: cy + oy, ox, oy });
    }
    restLen = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    restArea = polyArea();
  }

  function polyArea() {
    let a = 0;
    for (let i = 0; i < N; i++) {
      const p = pts[i], q = pts[(i + 1) % N];
      a += p.x * q.y - q.x * p.y;
    }
    return Math.abs(a) * 0.5;
  }

  // ---- 1 ステップの物理（Verlet + 力）----
  let breathe = 0;
  function simulate(dt) {
    const area = polyArea();
    breathe += dt;
    // 呼吸で内圧をわずかに脈打たせる（reduce では静止）
    const puff = rm.matches ? 1 : 1 + Math.sin(breathe * 1.6) * 0.018;
    const pressure = PRESSURE * puff * (restArea / Math.max(area, 1));

    for (let i = 0; i < N; i++) {
      const p = pts[i];
      p.fx = 0; p.fy = 0;
    }
    // 円周ばね（隣接）
    for (let i = 0; i < N; i++) {
      const a = pts[i], b = pts[(i + 1) % N];
      let dx = b.x - a.x, dy = b.y - a.y;
      let d = Math.hypot(dx, dy) || 1e-4;
      const f = K_EDGE * (d - restLen);
      const nx = dx / d, ny = dy / d;
      a.fx += nx * f; a.fy += ny * f;
      b.fx -= nx * f; b.fy -= ny * f;
    }
    // 内圧: 各辺の外向き法線に沿って押し出す
    for (let i = 0; i < N; i++) {
      const a = pts[i], b = pts[(i + 1) % N];
      let dx = b.x - a.x, dy = b.y - a.y;
      let d = Math.hypot(dx, dy) || 1e-4;
      // 外向き法線（時計/反時計に依らず面積で符号を吸収）
      let nx = dy / d, ny = -dx / d;
      const mx = (a.x + b.x) / 2 - cx, my = (a.y + b.y) / 2 - cy;
      if (nx * mx + ny * my < 0) { nx = -nx; ny = -ny; }
      const pf = pressure * d * 46;
      a.fx += nx * pf * 0.5; a.fy += ny * pf * 0.5;
      b.fx += nx * pf * 0.5; b.fy += ny * pf * 0.5;
    }
    // 中立形状へ戻す弱いばね（丸へ収束させる）
    for (let i = 0; i < N; i++) {
      const p = pts[i];
      p.fx += (cx + p.ox - p.x) * K_HOME;
      p.fy += (cy + p.oy - p.y) * K_HOME;
    }
    // Verlet 積分（減衰付き）
    const damp = Math.max(0, 1 - DAMP * dt);
    for (let i = 0; i < N; i++) {
      const p = pts[i];
      const vx = (p.x - p.px) * damp, vy = (p.y - p.py) * damp;
      p.px = p.x; p.py = p.y;
      p.x += vx + p.fx * dt * dt;
      p.y += vy + p.fy * dt * dt;
    }
  }

  // ---- 入力: 撫でる（引っ張る）/ つつく（押し込む）----
  let pointer = { x: 0, y: 0, px: 0, py: 0, down: false, id: -1 };
  const REACH = () => R * 0.62;
  canvas.addEventListener("pointerdown", (e) => {
    pointer.down = true; pointer.id = e.pointerId;
    pointer.x = pointer.px = e.clientX; pointer.y = pointer.py = e.clientY;
    canvas.setPointerCapture(e.pointerId);
    canvas.style.cursor = "grabbing";
    poke(e.clientX, e.clientY, 0, 0, 1.0);
  });
  canvas.addEventListener("pointermove", (e) => {
    const x = e.clientX, y = e.clientY;
    if (pointer.down) {
      poke(x, y, x - pointer.x, y - pointer.y, 0.5);
    }
    pointer.px = pointer.x; pointer.py = pointer.y;
    pointer.x = x; pointer.y = y;
  });
  const up = () => { pointer.down = false; canvas.style.cursor = "grab"; };
  canvas.addEventListener("pointerup", up);
  canvas.addEventListener("pointercancel", up);

  // 近傍の質点に力を与える（撫で=引っ張り, つつき=押し込み）
  function poke(x, y, dx, dy, strength) {
    const reach = REACH();
    for (const p of pts) {
      const ddx = p.x - x, ddy = p.y - y;
      const dist = Math.hypot(ddx, ddy);
      if (dist > reach) continue;
      const w = (1 - dist / reach);
      const ww = w * w;
      // 移動方向へ引っ張る
      p.x += dx * ww * 0.9 * strength;
      p.y += dy * ww * 0.9 * strength;
      // 押し込み（指の位置へ少し凹ませる）
      const inward = ww * 10 * strength;
      const nl = dist || 1e-4;
      p.x -= (ddx / nl) * inward;
      p.y -= (ddy / nl) * inward;
    }
  }

  // ---- 描画 ----
  let W = 0, H = 0;
  function resize() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildBody();
  }

  // 質点を滑らかな閉曲線で結ぶ（Catmull-Rom 風の中点補間）
  function bodyPath() {
    ctx.beginPath();
    const first = pts[0], last = pts[N - 1];
    ctx.moveTo((last.x + first.x) / 2, (last.y + first.y) / 2);
    for (let i = 0; i < N; i++) {
      const a = pts[i], b = pts[(i + 1) % N];
      ctx.quadraticCurveTo(a.x, a.y, (a.x + b.x) / 2, (a.y + b.y) / 2);
    }
    ctx.closePath();
  }

  // 体の重心と上端（耳・しっぽを添える）
  function centroid() {
    let sx = 0, sy = 0;
    for (const p of pts) { sx += p.x; sy += p.y; }
    return { x: sx / N, y: sy / N };
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const g = centroid();

    // やわらかい落ち影
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(g.x, cy + R * 1.18, R * 0.92, R * 0.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = mixHex(C.bg, C.ink, 0.10);
    ctx.filter = "blur(6px)";
    ctx.fill();
    ctx.restore();

    // しっぽ（上端の左、体に沿ってゆらぐ）
    const tailBase = pts[Math.round(N * 0.62)];
    ctx.save();
    ctx.strokeStyle = mixHex(C.belly, C.accentFg, 0.28);
    ctx.lineWidth = R * 0.16;
    ctx.lineCap = "round";
    const sway = rm.matches ? 0 : Math.sin(breathe * 1.4) * R * 0.12;
    ctx.beginPath();
    ctx.moveTo(tailBase.x, tailBase.y);
    ctx.quadraticCurveTo(tailBase.x - R * 0.55, tailBase.y + R * 0.1, tailBase.x - R * 0.5 + sway, tailBase.y - R * 0.5 + sway * 0.4);
    ctx.stroke();
    ctx.restore();

    // 耳（上端に 2 つ、体の膨らみに追従）
    const earTop = pts[0];
    drawEar(earTop.x - R * 0.5, earTop.y + R * 0.18, -0.5);
    drawEar(earTop.x + R * 0.5, earTop.y + R * 0.18, 0.5);

    // おなか本体（グラデーションで丸みを出す）
    bodyPath();
    const grad = ctx.createRadialGradient(g.x - R * 0.3, g.y - R * 0.4, R * 0.1, g.x, g.y, R * 1.3);
    grad.addColorStop(0, mixHex(C.belly, C.bellyHi, 0.45));
    grad.addColorStop(0.6, C.belly);
    grad.addColorStop(1, mixHex(C.belly, C.accentFg, 0.34));
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = mixHex(C.belly, C.accentFg, 0.42);
    ctx.lineWidth = 2;
    ctx.stroke();

    // ハイライト（左上のつや）
    ctx.save();
    bodyPath();
    ctx.clip();
    ctx.beginPath();
    ctx.ellipse(g.x - R * 0.34, g.y - R * 0.5, R * 0.34, R * 0.22, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = mixHex(C.bellyHi, C.belly, 0.15);
    ctx.globalAlpha = 0.5;
    ctx.fill();
    ctx.restore();

    // おへそ
    ctx.beginPath();
    ctx.ellipse(g.x, g.y + R * 0.28, R * 0.055, R * 0.09, 0, 0, Math.PI * 2);
    ctx.fillStyle = mixHex(C.belly, C.accentFg, 0.5);
    ctx.globalAlpha = 0.55;
    ctx.fill();
    ctx.globalAlpha = 1;

    // 顔（上の方に小さな寝顔）
    const fy = g.y - R * 0.42;
    ctx.strokeStyle = mixHex(C.accentFg, C.belly, 0.15);
    ctx.lineWidth = R * 0.02;
    ctx.lineCap = "round";
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.arc(g.x + s * R * 0.2, fy, R * 0.07, 0.2 * Math.PI, 0.8 * Math.PI);
      ctx.stroke();
    }
    // 頬
    ctx.fillStyle = mixHex(C.belly, "#f0a8bd", 0.5);
    ctx.globalAlpha = 0.4;
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.ellipse(g.x + s * R * 0.28, fy + R * 0.09, R * 0.06, R * 0.04, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawEar(x, y, tilt) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(tilt);
    ctx.beginPath();
    ctx.moveTo(-R * 0.16, R * 0.05);
    ctx.quadraticCurveTo(0, -R * 0.34, R * 0.16, R * 0.05);
    ctx.quadraticCurveTo(0, -R * 0.02, -R * 0.16, R * 0.05);
    ctx.closePath();
    ctx.fillStyle = mixHex(C.belly, C.accentFg, 0.18);
    ctx.fill();
    // 内耳
    ctx.beginPath();
    ctx.moveTo(-R * 0.08, R * 0.02);
    ctx.quadraticCurveTo(0, -R * 0.2, R * 0.08, R * 0.02);
    ctx.closePath();
    ctx.fillStyle = mixHex(C.belly, "#f0a8bd", 0.55);
    ctx.fill();
    ctx.restore();
  }

  // ---- メインループ（固定ステップ）----
  let last = performance.now(), acc = 0;
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    acc += dt;
    const STEP = 1 / 120;
    let n = 0;
    while (acc >= STEP && n < 6) { simulate(STEP); acc -= STEP; n++; }
    if (acc >= STEP) acc = 0;
    draw();
    requestAnimationFrame(frame);
  }

  new MutationObserver(readColors).observe(document.documentElement, {
    attributes: true, attributeFilter: ["data-theme", "data-appearance"],
  });
  addEventListener("resize", resize);
  readColors();
  resize();
  // 開いた瞬間、軽くぽよんと弾ませる
  if (!rm.matches) for (const p of pts) { p.y -= R * 0.12; }
  requestAnimationFrame((t) => { last = t; requestAnimationFrame(frame); });
})();
</script>
</body>
</html>
