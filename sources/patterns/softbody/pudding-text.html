<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="ぷるぷる文字">
<meta name="pattern-desc" content="ポインタが触れた文字がばね振動でぷるぷる震え、震えは隣の文字へ弱く伝播する。">
<title>ぷるぷる文字</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif;
    background: var(--color-bg-primary); color: var(--color-fg-primary);
    display: grid; place-items: center; touch-action: none;
  }
  .stage { text-align: center; padding: 0 24px; user-select: none; -webkit-user-select: none; }
  .line { display: block; white-space: nowrap; line-height: 1.28; }
  .line.big { font-size: clamp(2.6rem, 11vw, 5.4rem); font-weight: 800; letter-spacing: .01em; }
  .line.sub { font-size: clamp(1rem, 3.6vw, 1.5rem); font-weight: 600; color: var(--color-fg-secondary); margin-top: .3em; }
  .ch {
    display: inline-block; will-change: transform; transform-origin: 50% 100%;
  }
  .ch.space { width: .32em; }
  .accent { color: var(--color-accent-default); }
  .hint {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    padding: .55rem 1.15rem; border-radius: 999px; font-size: .78rem; letter-spacing: .05em;
    color: var(--color-fg-secondary);
    background: color-mix(in srgb, var(--color-bg-elevated) 78%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(8px); pointer-events: none; white-space: nowrap;
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <span class="line big" data-text="ぷるぷる"></span>
  <span class="line big accent" data-text="さわってみて"></span>
  <span class="line sub" data-text="ばねで震え、隣へ伝わる"></span>
</div>
<div class="hint">文字にポインタを近づけると、ぷるっと震えて隣へ伝播する</div>
<script>
(() => {
"use strict";
const stage = document.getElementById("stage");
const rmq = window.matchMedia("(prefers-reduced-motion: reduce)");
let reduced = rmq.matches;
rmq.addEventListener?.("change",(e)=>{ reduced = e.matches; });

// 文字を span 化。各文字にばね状態を持たせる
const chars = []; // {el, disp, vel, cx, cy, group, gi}
document.querySelectorAll(".line").forEach((line, gi) => {
  const text = line.getAttribute("data-text") || "";
  line.textContent = "";
  const start = chars.length;
  [...text].forEach((c) => {
    const el = document.createElement("span");
    if (c === " "){ el.className = "ch space"; line.appendChild(el); return; }
    el.className = "ch"; el.textContent = c;
    line.appendChild(el);
    chars.push({ el, disp:0, vel:0, cx:0, cy:0, group:gi, idx: chars.length-start });
  });
});

let bounds = [];
function measure(){
  bounds = chars.map((ch) => {
    const r = ch.el.getBoundingClientRect();
    ch.cx = r.left + r.width/2; ch.cy = r.top + r.height/2;
    return { w:r.width, h:r.height };
  });
}
window.addEventListener("resize", () => { requestAnimationFrame(measure); });
requestAnimationFrame(measure);

// ---- ポインタで一番近い文字へ撃力 ----
let px=-1e9, py=-1e9, active=false, lastHit=-1, lastTime=0;
function poke(x,y){
  px=x; py=y;
  measure.dirty && measure();
  let best=-1, bd=1e9;
  for (let i=0;i<chars.length;i++){ const d=(chars[i].cx-x)**2+(chars[i].cy-y)**2; if (d<bd){bd=d;best=i;} }
  const now = performance.now();
  const near = Math.sqrt(bd) < 46;
  if (near && (best!==lastHit || now-lastTime>90)){
    // 撃力：速い動きほど強い（ここでは一定＋ランダム微差）
    chars[best].vel += -0.9 - Math.random()*0.35;
    lastHit = best; lastTime = now;
  }
  if (!near) lastHit = -1;
}
window.addEventListener("pointermove",(e)=>{ if (reduced) { pokeReduced(e.clientX,e.clientY); return; } poke(e.clientX,e.clientY); });
window.addEventListener("pointerdown",(e)=>{ if (reduced){ pokeReduced(e.clientX,e.clientY);} else poke(e.clientX,e.clientY); });

// reduced: 触れた瞬間の一発だけ小さく反応（常時アニメなし）
function pokeReduced(x,y){
  let best=-1,bd=1e9;
  for (let i=0;i<chars.length;i++){ const d=(chars[i].cx-x)**2+(chars[i].cy-y)**2; if (d<bd){bd=d;best=i;} }
  if (Math.sqrt(bd)<46 && best>=0){
    const ch=chars[best]; ch.el.style.transform="scaleY(0.86) scaleX(1.08)";
    setTimeout(()=>{ ch.el.style.transition="transform .4s cubic-bezier(.34,1.56,.64,1)"; ch.el.style.transform="";
      setTimeout(()=>ch.el.style.transition="",400); },70);
  }
}

// ---- ばね物理＋伝播 ----
const K = 320;          // 復元
const DAMP = 9;         // 減衰
const COUPLE = 0.16;    // 隣接結合（伝播）
let last = performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now; if (dt>0.05) dt=0.05;
  if (!reduced){
    // 結合力：同じ行の隣接文字と変位差を交換
    const coup = new Float64Array(chars.length);
    for (let i=0;i<chars.length;i++){
      const a=chars[i];
      const L=chars[i-1], Rr=chars[i+1];
      if (L && L.group===a.group) coup[i]+=(L.disp-a.disp)*COUPLE;
      if (Rr && Rr.group===a.group) coup[i]+=(Rr.disp-a.disp)*COUPLE;
    }
    let moving=false;
    for (let i=0;i<chars.length;i++){
      const c=chars[i];
      const acc = -K*c.disp - DAMP*c.vel + coup[i]*K;
      c.vel += acc*dt; c.disp += c.vel*dt;
      if (Math.abs(c.disp)>0.0006 || Math.abs(c.vel)>0.002) moving=true;
      // disp<0 で潰れる（縦縮み＋横膨らみ）。ぷるぷるの見え
      const d=c.disp;
      const sy = 1 + d;                 // d は負で縮む
      const sx = 1 - d*0.55;
      const ty = -d*10;                 // 少し持ち上がる
      c.el.style.transform = `translateY(${ty}px) scale(${sx.toFixed(4)}, ${sy.toFixed(4)})`;
      c.el.style.color = ""; // keep theme color
    }
    if (moving) measure.dirty = false;
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
