<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="滑らかアコーディオン">
<meta name="pattern-desc" content="height:auto を FLIP で計測し、開閉を滑らかに補間するアコーディオン。中身は時差でフェードし、他はそっと閉じる。">
<title>滑らかアコーディオン</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .wrap {
    width: min(560px, 100%);
    max-height: calc(100dvh - 48px);
    overflow-y: auto;
    padding: 64px 4px 24px;
    -webkit-overflow-scrolling: touch;
  }
  .lead {
    padding: 0 12px 20px;
  }
  .lead .eyebrow {
    font-size: .72rem; letter-spacing: .3em; text-transform: uppercase;
    color: var(--color-fg-muted);
  }
  .lead h1 { margin-top: 10px; font-size: 1.4rem; font-weight: 620; letter-spacing: .01em; }
  .item {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border-default);
    border-radius: 20px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .item.open { border-color: color-mix(in srgb, var(--color-accent-default) 45%, var(--color-border-default)); }
  .head {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    background: none;
    border: none;
    color: inherit;
    font: inherit;
    text-align: left;
    cursor: pointer;
  }
  .head .q { flex: 1; font-size: 1rem; font-weight: 560; }
  .head .num {
    font-size: .78rem; font-variant-numeric: tabular-nums;
    color: var(--color-fg-muted); width: 1.8em;
  }
  .chev {
    width: 20px; height: 20px; flex-shrink: 0;
    color: var(--color-accent-default);
    transition: transform .45s cubic-bezier(.2,.9,.25,1);
  }
  .item.open .chev { transform: rotate(180deg); }
  .panel {
    height: 0;
    overflow: hidden;
    will-change: height;
  }
  .panel-inner {
    padding: 2px 20px 22px;
    color: var(--color-fg-secondary);
    line-height: 1.85;
    font-size: .93rem;
  }
  .panel-inner > * { will-change: opacity, transform; }
  .panel-inner p + p { margin-top: 12px; }
  .tag {
    display: inline-block; margin-top: 14px;
    font-size: .74rem; letter-spacing: .04em;
    color: var(--color-accent-fg);
    background: color-mix(in srgb, var(--color-accent-default) 22%, var(--color-bg-elevated));
    padding: .3em .8em; border-radius: 999px;
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="lead">
    <div class="eyebrow">design system</div>
    <h1>好みで選ぶ、を支える仕組み</h1>
  </div>
  <div id="list"></div>
</div>
<script>
(() => {
  "use strict";
  const rm = matchMedia("(prefers-reduced-motion: reduce)");

  const DATA = [
    { q: "ひとつの正解に決めないのはなぜ？", a: ["その日の気分や用途で最適な見え方は変わります。丸みのある形が似合う日も、輪郭のはっきりした形が欲しい日もある。","だから複数のテーマとスタイルを併存させ、選び取るための余白を残しています。"], tag: "設計思想" },
    { q: "原本はどこにある？", a: ["人が触れるのは sources/ だけ。プラットフォーム非依存の生 SVG と JSON トークンが唯一の正です。","そこから build/ のスクリプトが各プラットフォーム向けの成果物を派生させます。"], tag: "single source of truth" },
    { q: "Web と Swift で名前は揃う？", a: ["揃います。同じ原本から生成するので、アイコン名もカラートークン名も両プラットフォームで一致します。","命名を変えると両方へ波及する破壊的変更として扱います。"], tag: "マルチプラットフォーム" },
    { q: "アニメーションの基準は？", a: ["静かなミニマル。余白を多くとり、角丸は大きめ、罫線は控えめに。","主役の差し色は淡いティール。純黒・純白のきつさを避け、生成りをベースにします。"], tag: "審美眼" },
  ];

  const list = document.getElementById("list");
  const EASE = "cubic-bezier(.22,.61,.24,1)";

  const items = DATA.map((d, i) => {
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `
      <button class="head" aria-expanded="false">
        <span class="num">0${i + 1}</span>
        <span class="q">${d.q}</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="panel"><div class="panel-inner">
        ${d.a.map((p) => `<p>${p}</p>`).join("")}
        <span class="tag">${d.tag}</span>
      </div></div>`;
    list.appendChild(item);
    const panel = item.querySelector(".panel");
    const head = item.querySelector(".head");
    const inner = item.querySelector(".panel-inner");
    head.addEventListener("click", () => toggle(i));
    return { item, panel, head, inner, open: false, anim: null };
  });

  function measureAuto(panel) {
    // FLIP 計測: 現在の height を退避して auto にした自然高を測り、元に戻す
    const prev = panel.style.height;
    panel.style.height = "auto";
    const h = panel.getBoundingClientRect().height;
    panel.style.height = prev;
    return h;
  }

  function animateHeight(o, to) {
    if (o.anim) o.anim.cancel();
    const from = o.panel.getBoundingClientRect().height;
    if (rm.matches) { o.panel.style.height = to === "auto" ? "auto" : to + "px"; return; }
    const target = to === "auto" ? measureAuto(o.panel) : to;
    const dur = Math.min(560, 220 + Math.abs(target - from) * 0.7);
    o.anim = o.panel.animate(
      [{ height: from + "px" }, { height: target + "px" }],
      { duration: dur, easing: EASE, fill: "forwards" }
    );
    o.anim.onfinish = () => {
      o.anim = null;
      // 開いたら auto にして中身の再流動に追従、閉じたら 0 固定
      o.panel.style.height = to === "auto" ? "auto" : "0px";
    };
  }

  function fadeChildren(o, dir) {
    if (rm.matches) { [...o.inner.children].forEach((c) => (c.style.opacity = "1", c.style.transform = "none")); return; }
    const kids = [...o.inner.children];
    kids.forEach((c, k) => {
      if (c.anim) c.anim.cancel();
      if (dir > 0) {
        c.anim = c.animate(
          [{ opacity: 0, transform: "translateY(10px)" }, { opacity: 1, transform: "translateY(0)" }],
          { duration: 420, delay: 90 + k * 70, easing: EASE, fill: "both" }
        );
      } else {
        c.anim = c.animate(
          [{ opacity: 1 }, { opacity: 0 }],
          { duration: 160, easing: "ease-in", fill: "both" }
        );
      }
    });
  }

  function open(o) {
    o.open = true;
    o.item.classList.add("open");
    o.head.setAttribute("aria-expanded", "true");
    animateHeight(o, "auto");
    fadeChildren(o, 1);
  }
  function close(o) {
    if (!o.open) return;
    o.open = false;
    o.item.classList.remove("open");
    o.head.setAttribute("aria-expanded", "false");
    animateHeight(o, 0);
    fadeChildren(o, -1);
  }

  function toggle(i) {
    const o = items[i];
    if (o.open) { close(o); return; }
    // 他はそっと閉じる（開くものより気持ち遅く）
    items.forEach((x) => { if (x !== o && x.open) close(x); });
    open(o);
  }

  // 初期状態: 最初の項目を開いておく
  requestAnimationFrame(() => open(items[0]));
})();
</script>
</body>
</html>
