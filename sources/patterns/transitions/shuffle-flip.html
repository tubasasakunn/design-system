<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="並べ替え FLIP">
<meta name="pattern-desc" content="ソート／シャッフルでカードが FLIP アニメーションで滑らかに並び替わる。移動距離で時差をつけ、追い越しが見える。">
<title>並べ替え FLIP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .wrap { width: min(680px, 100%); }
  .bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 0 4px 18px; justify-content: center;
  }
  .bar .title {
    flex: 1 1 100%; text-align: center;
    font-size: .72rem; letter-spacing: .3em; text-transform: uppercase;
    color: var(--color-fg-muted); margin-bottom: 6px;
  }
  .bar button {
    font: inherit; font-size: .85rem; font-weight: 540;
    padding: .55em 1.1em; border-radius: 999px; cursor: pointer;
    border: 1px solid var(--color-border-default);
    background: var(--color-bg-elevated);
    color: var(--color-fg-secondary);
    transition: transform .12s ease, border-color .2s ease, color .2s ease;
  }
  .bar button:active { transform: scale(.95); }
  .bar button.on {
    border-color: color-mix(in srgb, var(--color-accent-default) 55%, transparent);
    color: var(--color-accent-fg);
    background: color-mix(in srgb, var(--color-accent-default) 16%, var(--color-bg-elevated));
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }
  .card {
    border-radius: 20px;
    padding: 16px 14px;
    border: 1px solid var(--color-border-default);
    background: var(--color-bg-elevated);
    will-change: transform;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 118px;
  }
  .swatch {
    width: 34px; height: 34px; border-radius: 12px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
  }
  .card .name { font-size: .92rem; font-weight: 560; }
  .card .val {
    font-size: .74rem; font-variant-numeric: tabular-nums;
    color: var(--color-fg-muted);
  }
  .bars { display: flex; gap: 3px; align-items: flex-end; height: 22px; margin-top: auto; }
  .bars i { flex: 1; border-radius: 3px 3px 0 0; background: var(--color-border-strong); display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <div class="title">並べ替え FLIP</div>
    <button data-sort="hue" class="on">色相順</button>
    <button data-sort="light">明度順</button>
    <button data-sort="name">名前順</button>
    <button data-sort="shuffle">シャッフル</button>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
(() => {
  "use strict";
  const rm = matchMedia("(prefers-reduced-motion: reduce)");
  const grid = document.getElementById("grid");

  // パレット（彩りのリテラル使用可）
  const PAL = [
    { name: "teal", hex: "#5bbcb1" },
    { name: "pink", hex: "#f0a8bd" },
    { name: "yellow", hex: "#f1d189" },
    { name: "lavender", hex: "#bcb2e8" },
    { name: "coral", hex: "#f3a890" },
    { name: "sky", hex: "#9fc8ea" },
    { name: "mint", hex: "#a9dcc0" },
    { name: "sand", hex: "#e6d3b3" },
    { name: "rose", hex: "#e8a9a2" },
    { name: "sage", hex: "#b7c9a8" },
    { name: "plum", hex: "#c9a6c4" },
    { name: "aqua", hex: "#8fd3cf" },
  ];

  function hexToHsl(hex) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) / 255, g = ((n >> 8) & 255) / 255, b = (n & 255) / 255;
    const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
    let h = 0;
    if (d) {
      if (mx === r) h = ((g - b) / d) % 6;
      else if (mx === g) h = (b - r) / d + 2;
      else h = (r - g) / d + 4;
      h *= 60; if (h < 0) h += 360;
    }
    const l = (mx + mn) / 2;
    return { h, l };
  }

  const items = PAL.map((p, i) => {
    const hsl = hexToHsl(p.hex);
    const el = document.createElement("div");
    el.className = "card";
    const bars = Array.from({ length: 5 }, () => `<i style="height:${20 + Math.random() * 80}%;background:${p.hex}"></i>`).join("");
    el.innerHTML = `
      <div class="swatch" style="background:${p.hex}"></div>
      <div class="name">${p.name}</div>
      <div class="val">H ${Math.round(hsl.h)}° · L ${Math.round(hsl.l * 100)}%</div>
      <div class="bars">${bars}</div>`;
    grid.appendChild(el);
    return { el, name: p.name, hue: hsl.h, light: hsl.l, order: i };
  });

  let currentSort = "hue";

  function reorderDom(order) {
    order.forEach((it) => grid.appendChild(it.el));
  }

  function flip(mutate) {
    if (rm.matches) { mutate(); return; }
    // FIRST
    const first = new Map();
    items.forEach((it) => first.set(it, it.el.getBoundingClientRect()));
    // MUTATE（DOM 並び替え）
    mutate();
    // LAST + INVERT + PLAY
    let maxDist = 1;
    const moves = items.map((it) => {
      const a = first.get(it), b = it.el.getBoundingClientRect();
      const dx = a.left - b.left, dy = a.top - b.top;
      const dist = Math.hypot(dx, dy);
      if (dist > maxDist) maxDist = dist;
      return { it, dx, dy, dist };
    });
    moves.forEach(({ it, dx, dy, dist }) => {
      if (it.el.anim) it.el.anim.cancel();
      if (dist < 0.5) return;
      // 距離で時差。遠いカードほど少し遅らせる → 追い越しが見える
      const delay = (dist / maxDist) * 120;
      const dur = 460 + (dist / maxDist) * 320;
      // 移動中にわずかに浮かせる（z 的表現）
      it.el.style.zIndex = String(1 + Math.round((dist / maxDist) * 10));
      it.el.anim = it.el.animate(
        [
          { transform: `translate(${dx}px, ${dy}px) scale(1)` },
          { transform: `translate(${dx * 0.35}px, ${dy * 0.35}px) scale(1.05)`, offset: 0.5 },
          { transform: "translate(0,0) scale(1)" },
        ],
        { duration: dur, delay, easing: "cubic-bezier(.34,.02,.2,1)", fill: "backwards" }
      );
      it.el.anim.onfinish = () => { it.el.style.zIndex = ""; it.el.anim = null; };
    });
  }

  function sortBy(kind) {
    currentSort = kind;
    document.querySelectorAll(".bar button").forEach((b) => b.classList.toggle("on", b.dataset.sort === kind));
    flip(() => {
      let order = [...items];
      if (kind === "hue") order.sort((a, b) => a.hue - b.hue);
      else if (kind === "light") order.sort((a, b) => b.light - a.light);
      else if (kind === "name") order.sort((a, b) => a.name.localeCompare(b.name));
      else {
        // Fisher-Yates シャッフル
        for (let i = order.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [order[i], order[j]] = [order[j], order[i]];
        }
      }
      reorderDom(order);
    });
  }

  document.querySelectorAll(".bar button").forEach((b) =>
    b.addEventListener("click", () => sortBy(b.dataset.sort))
  );

  // 初期: 色相順に並べる
  requestAnimationFrame(() => sortBy("hue"));
})();
</script>
</body>
</html>
