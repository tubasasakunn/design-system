<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ネオンサイン</title>
<meta name="pattern-title" content="ネオンサイン">
<meta name="pattern-desc" content="ネオン管の文字が揺らめきながら灯り、たまに瞬断する上品な夜。スイッチで消灯と点灯。">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  /* 明暗どちらのテーマでも「夜」に見えるよう、インクを混ぜた暗いパネルを敷く */
  #night {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background:
      radial-gradient(120% 90% at 50% 40%,
        color-mix(in srgb, var(--color-fg-primary) 72%, var(--color-bg-elevated)) 0%,
        color-mix(in srgb, var(--color-fg-primary) 90%, #000) 78%);
  }
  #sign {
    text-align: center; user-select: none;
    transform: translateY(-4%);
    transition: filter .5s ease;
  }
  .line { display: block; line-height: 1.15; }
  .l1 { font-size: clamp(52px, 15vw, 150px); font-weight: 800; letter-spacing: .04em; }
  .l2 { font-size: clamp(20px, 5.2vw, 48px); font-weight: 700; letter-spacing: .5em; margin-top: .35em; margin-right: -.5em; }
  .l3 { font-size: clamp(15px, 3.4vw, 30px); font-weight: 600; letter-spacing: .18em; margin-top: 1.1em; }
  .ch {
    display: inline-block;
    color: var(--neon-core);
    text-shadow:
      0 0 2px var(--neon-core),
      0 0 8px var(--neon),
      0 0 18px var(--neon),
      0 0 34px var(--neon),
      0 0 62px var(--neon-far);
    transition: opacity .09s linear, text-shadow .12s ease;
  }
  .ch.sp { opacity: 0; }
  /* 個々の管のちらつき */
  .ch.dim { opacity: .45; text-shadow: 0 0 2px var(--neon-core), 0 0 6px var(--neon); }
  .ch.out { opacity: .12; text-shadow: none; color: color-mix(in srgb, var(--neon) 30%, #1a1a1a); }
  /* 消灯（スイッチ OFF）: 灯りが落ち、残光だけ */
  #sign.off .ch {
    opacity: .1;
    color: color-mix(in srgb, var(--neon) 22%, #202020);
    text-shadow: none;
  }
  #switch {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: .6rem;
    padding: .5rem .9rem .5rem .55rem; border-radius: 999px;
    font-size: .82rem; letter-spacing: .04em; cursor: pointer;
    color: var(--color-fg-secondary);
    background: color-mix(in srgb, var(--color-bg-elevated) 84%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(8px);
  }
  #knob {
    width: 40px; height: 22px; border-radius: 999px; position: relative;
    background: color-mix(in srgb, var(--color-fg-muted) 55%, transparent);
    transition: background .3s ease;
  }
  #knob::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--color-bg-elevated);
    box-shadow: 0 1px 3px rgba(0,0,0,.35);
    transition: transform .28s cubic-bezier(.34,1.56,.64,1);
  }
  #switch.on #knob { background: var(--color-accent-default); }
  #switch.on #knob::after { transform: translateX(18px); }
</style>
</head>
<body>
<div id="night">
  <div id="sign">
    <span class="line l1" data-neon="teal" data-text="純喫茶"></span>
    <span class="line l2" data-neon="pink" data-text="夜想"></span>
    <span class="line l3" data-neon="teal" data-text="ＯＰＥＮ ・ 深夜営業"></span>
  </div>
</div>
<button id="switch" class="on" type="button" aria-label="ネオンの電源">
  <span id="knob"></span><span id="swlabel">点灯</span>
</button>
<script>
(() => {
  "use strict";
  const root = document.documentElement;
  const reduce = matchMedia("(prefers-reduced-motion: reduce)");
  const sign = document.getElementById("sign");
  const sw = document.getElementById("switch");
  const swlabel = document.getElementById("swlabel");

  const NEON = {
    teal: { core: "#dffbf5", neon: "#5bbcb1", far: "#2f8f86" },
    pink: { core: "#ffe9f0", neon: "#f0a8bd", far: "#c66d88" },
  };

  // 文字を 1 管ずつ span 化する
  const cells = [];
  for (const line of document.querySelectorAll(".line")) {
    const set = NEON[line.dataset.neon] || NEON.teal;
    line.style.setProperty("--neon-core", set.core);
    line.style.setProperty("--neon", set.neon);
    line.style.setProperty("--neon-far", set.far);
    const text = line.dataset.text;
    for (const c of text) {
      const s = document.createElement("span");
      s.className = "ch" + (c === " " || c === "　" ? " sp" : "");
      s.textContent = c === " " ? " " : c;
      line.appendChild(s);
      if (c !== " " && c !== "　") cells.push(s);
    }
  }

  let on = true;
  function setPower(v) {
    on = v;
    sign.classList.toggle("off", !on);
    sw.classList.toggle("on", on);
    swlabel.textContent = on ? "点灯" : "消灯";
    if (on && !reduce.matches) warmup();
  }
  sw.addEventListener("click", () => setPower(!on));

  // 点灯時のウォームアップ: 端から順にじわっと灯す
  function warmup() {
    cells.forEach((c, i) => {
      c.classList.add("out");
      setTimeout(() => {
        if (!on) return;
        c.classList.remove("out");
        // 灯りかけの二度点き
        if (Math.random() < 0.5) {
          c.classList.add("dim");
          setTimeout(() => c.classList.remove("dim"), 70 + Math.random() * 90);
        }
      }, 120 + i * 55 + Math.random() * 80);
    });
  }

  // 通常運転のゆらぎ: たまに 1 管が瞬く / まれに一部が瞬断
  let last = performance.now(), flickT = 0, outageT = 4 + Math.random() * 5;
  function tick(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.1) dt = 0.1;
    if (on && !reduce.matches) {
      flickT -= dt;
      if (flickT <= 0) {
        flickT = 0.12 + Math.random() * 0.5;
        const c = cells[(Math.random() * cells.length) | 0];
        if (c && !c.classList.contains("out")) {
          c.classList.add("dim");
          setTimeout(() => c.classList.remove("dim"), 40 + Math.random() * 120);
        }
      }
      outageT -= dt;
      if (outageT <= 0) {
        outageT = 6 + Math.random() * 7;
        // 何管かをまとめて一瞬落とす（瞬断）
        const n = 1 + ((Math.random() * 3) | 0);
        const start = (Math.random() * Math.max(1, cells.length - n)) | 0;
        const group = cells.slice(start, start + n);
        let blinks = 1 + ((Math.random() * 3) | 0);
        const blink = () => {
          group.forEach((c) => c.classList.add("out"));
          setTimeout(() => {
            group.forEach((c) => c.classList.remove("out"));
            if (--blinks > 0 && on) setTimeout(blink, 45 + Math.random() * 70);
          }, 30 + Math.random() * 55);
        };
        blink();
      }
    }
    requestAnimationFrame(tick);
  }

  if (!reduce.matches) warmup();
  requestAnimationFrame((t) => { last = t; requestAnimationFrame(tick); });
})();
</script>
</body>
</html>
