<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>分割リビール</title>
<meta name="pattern-title" content="分割リビール">
<meta name="pattern-desc" content="見出しが行・文字に分割され、マスクの下から時差とイージングでせり上がって現れる。">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    overflow: hidden;
    display: grid; place-items: center;
    height: 100dvh;
  }
  #stage { text-align: left; padding: 1.2rem; user-select: none; }
  .line {
    display: block;
    overflow: hidden;               /* マスク: はみ出た文字を隠す */
    padding: 0 .06em;
  }
  .line .inner { display: inline-block; white-space: nowrap; }
  .kicker {
    font-size: clamp(.72rem, 2.6vw, .92rem);
    letter-spacing: .34em;
    font-weight: 600;
    color: var(--color-accent-hover);
    margin-bottom: .6rem;
  }
  .title { font-size: clamp(2.2rem, 10vw, 5.4rem); font-weight: 800; line-height: 1.06; }
  .lede {
    font-size: clamp(.92rem, 3.4vw, 1.25rem);
    font-weight: 500;
    color: var(--color-fg-secondary);
    line-height: 1.5;
    margin-top: 1.1rem;
    max-width: 22em;
  }
  .ch { display: inline-block; will-change: transform, opacity; }
  .ch.space { width: .3em; }
  #replay {
    margin-top: 2rem;
    padding: .55rem 1.3rem; border-radius: 999px; font: inherit; font-size: .82rem;
    cursor: pointer; color: var(--color-fg-secondary);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border-strong);
    transition: transform .16s ease, border-color .16s ease;
  }
  #replay:hover { border-color: var(--color-accent-default); }
  #replay:active { transform: scale(.95); }
</style>
</head>
<body>
<div id="stage">
  <div class="kicker" data-split="line" data-mode="fade">DESIGN SYSTEM</div>
  <h1 class="title" data-split="char">静けさを</h1>
  <h1 class="title" data-split="char">設計する</h1>
  <p class="lede" data-split="word">余白と時差、上質なイージングで、ことばが下から静かにせり上がる。</p>
  <button id="replay" type="button">もう一度 見る</button>
</div>
<script>
(() => {
  "use strict";
  const reduce = matchMedia("(prefers-reduced-motion: reduce)");
  const nodes = [...document.querySelectorAll("[data-split]")];
  const items = [];   // {inner, delay, dist, rot, mode}

  // 文字/単語/行ごとに inner を作り、行ラッパで overflow:hidden マスクにする
  function wrapUnit(parent, content, isSpace) {
    const line = document.createElement("span");
    line.className = "line";
    line.style.display = parent.tagName === "P" || parent.classList.contains("kicker") ? "block" : "inline-block";
    const inner = document.createElement("span");
    inner.className = "inner";
    const ch = document.createElement("span");
    ch.className = "ch" + (isSpace ? " space" : "");
    if (!isSpace) ch.textContent = content;
    inner.appendChild(ch);
    line.appendChild(inner);
    parent.appendChild(line);
    return isSpace ? null : inner;
  }

  let order = 0;
  for (const node of nodes) {
    const mode = node.dataset.split;
    const text = node.textContent;
    node.textContent = "";
    node.style.display = node.classList.contains("lede") || node.classList.contains("kicker") ? "block" : "inline-block";

    let units = [];
    if (mode === "char") units = [...text];
    else if (mode === "word") units = text.split(/(\s+)/);
    else units = [text]; // line

    for (const u of units) {
      const isSpace = /^\s+$/.test(u) || u === "";
      const inner = wrapUnit(node, u, isSpace);
      if (mode === "line") node.appendChild(document.createElement("br"));
      if (!inner) continue;
      items.push({
        inner,
        seq: order++,
        dist: 100,                       // 初期は下に 100% 隠れる
        rot: (Math.random() - 0.5) * 6,  // ごく僅かな傾き
      });
    }
  }

  // stagger: 出現順に少しずつ遅らせる。全体を心地よい尺に収める
  const STAGGER = 0.05, DUR = 0.9;
  const total = items.length;
  for (const it of items) it.delay = (it.seq / Math.max(1, total)) * (total * STAGGER * 0.6) + it.seq * STAGGER * 0.4;

  // easeOutExpo 風 + 僅かなオーバーシュート
  const easeOut = (t) => t >= 1 ? 1 : 1 - Math.pow(2, -10 * t);
  const back = (t) => { const c = 1.2; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };

  let startTime = 0, raf = 0;
  function setState(it, p) {
    const e = easeOut(p);
    const y = (1 - e) * it.dist;                 // 100% -> 0
    const r = (1 - back(Math.min(1, p))) * it.rot;
    it.inner.style.transform = "translateY(" + y.toFixed(2) + "%) rotate(" + r.toFixed(2) + "deg)";
    it.inner.style.opacity = String(Math.min(1, p * 2.2));
  }

  function frame(now) {
    const el = (now - startTime) / 1000;
    let done = true;
    for (const it of items) {
      let p = (el - it.delay) / DUR;
      if (p < 0) p = 0; else if (p > 1) p = 1;
      if (p < 1) done = false;
      setState(it, p);
    }
    if (!done) raf = requestAnimationFrame(frame);
  }

  function play() {
    cancelAnimationFrame(raf);
    if (reduce.matches) { for (const it of items) setState(it, 1); return; }
    for (const it of items) setState(it, 0);
    startTime = performance.now();
    raf = requestAnimationFrame(frame);
  }

  document.getElementById("replay").addEventListener("click", play);
  reduce.addEventListener?.("change", () => { if (reduce.matches) { cancelAnimationFrame(raf); for (const it of items) setState(it, 1); } });
  play();
})();
</script>
</body>
</html>
