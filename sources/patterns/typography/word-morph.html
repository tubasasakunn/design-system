<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>語のモーフ</title>
<meta name="pattern-title" content="語のモーフ">
<meta name="pattern-desc" content="季節の言葉が粒子に解け、最短距離でマッチングしながら次の語へ組み変わっていく。">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--color-bg-primary);
    color: var(--color-fg-primary);
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  #stage { position: fixed; inset: 0; display: block; touch-action: none; cursor: pointer; }
  #hint {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    padding: .5rem 1.05rem; border-radius: 999px;
    font-size: .8rem; letter-spacing: .05em;
    color: var(--color-fg-secondary);
    background: color-mix(in srgb, var(--color-bg-elevated) 80%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(8px);
    pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="hint">タップで次の季語へ ・ 放っておいても移り変わる</div>
<script>
(() => {
  "use strict";
  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d");
  const root = document.documentElement;
  const reduce = matchMedia("(prefers-reduced-motion: reduce)");

  const token = (n, fb) => getComputedStyle(root).getPropertyValue(n).trim() || fb;
  let COL = {};
  function readColors() {
    COL = {
      ink:    token("--color-fg-primary", "#2c2a26"),
      soft:   token("--color-fg-secondary", "#6c655b"),
      muted:  token("--color-fg-muted", "#a79f91"),
      accent: token("--color-accent-default", "#5bbcb1"),
    };
  }
  readColors();
  new MutationObserver(readColors).observe(root, { attributes: true, attributeFilter: ["data-theme", "data-appearance"] });

  // 季節の言葉（春→夏→秋→冬をひとめぐり）
  const words = ["花筏", "陽炎", "青嵐", "蝉時雨", "夕立", "野分", "望月", "夜長", "風花", "冴返る"];
  let wordIndex = 0;

  let W = 0, H = 0, DPR = 1;
  const off = document.createElement("canvas");
  const offCtx = off.getContext("2d", { willReadFrequently: true });

  // オフスクリーンに語を描いてピクセルをサンプリングし、点群を得る
  function sampleWord(text) {
    const maxW = Math.min(W * 0.8, 880);
    let fontPx = Math.min(H * 0.36, 300);
    for (let i = 0; i < 8; i++) {
      offCtx.font = `700 ${fontPx}px system-ui, sans-serif`;
      const w = offCtx.measureText(text).width;
      if (w <= maxW) break;
      fontPx *= maxW / w;
    }
    offCtx.font = `700 ${fontPx}px system-ui, sans-serif`;
    const m = offCtx.measureText(text);
    const textW = Math.ceil(m.width) + 8;
    const textH = Math.ceil(fontPx * 1.28);
    off.width = textW; off.height = textH;
    offCtx.clearRect(0, 0, textW, textH);
    offCtx.fillStyle = "#000";
    offCtx.textBaseline = "middle";
    offCtx.textAlign = "left";
    offCtx.font = `700 ${fontPx}px system-ui, sans-serif`;
    offCtx.fillText(text, 4, textH / 2);
    const img = offCtx.getImageData(0, 0, textW, textH).data;
    const pts = [];
    const step = Math.max(3, Math.round(fontPx / 40));
    for (let y = 0; y < textH; y += step) {
      for (let x = 0; x < textW; x += step) {
        if (img[(y * textW + x) * 4 + 3] > 128) {
          pts.push({
            x: (W - textW) / 2 + x + (Math.random() - 0.5) * step,
            y: (H - textH) / 2 + y + (Math.random() - 0.5) * step,
          });
        }
      }
    }
    return pts;
  }

  const particles = [];
  function makeParticle() {
    const a = Math.random() * Math.PI * 2, r = Math.max(W, H);
    return {
      x: W / 2 + Math.cos(a) * r, y: H / 2 + Math.sin(a) * r,
      vx: 0, vy: 0, tx: W / 2, ty: H / 2,
      size: 1.3 + Math.random() * 1.5,
      active: false, mix: Math.random(),
    };
  }

  // 現在の粒子位置に対して、各目標点へ最も近い未使用粒子を割り当てる（貪欲な最短マッチング）。
  // 粒子を空間グリッドに入れて近傍のみ探索することで O(n) 近くに抑える。
  function assignTargets(pts) {
    while (particles.length < pts.length) particles.push(makeParticle());
    const cell = 90;
    const cols = Math.max(1, Math.ceil(W / cell) + 1);
    const rows = Math.max(1, Math.ceil(H / cell) + 1);
    const grid = new Map();
    const key = (cx, cy) => cx + cy * cols;
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const cx = Math.min(cols - 1, Math.max(0, Math.floor(p.x / cell)));
      const cy = Math.min(rows - 1, Math.max(0, Math.floor(p.y / cell)));
      let b = grid.get(key(cx, cy));
      if (!b) grid.set(key(cx, cy), (b = []));
      b.push(i);
    }
    const used = new Uint8Array(particles.length);
    // 目標点をシャッフルして偏りを避ける
    for (let i = pts.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      const t = pts[i]; pts[i] = pts[j]; pts[j] = t;
    }
    for (const pt of pts) {
      const gx = Math.min(cols - 1, Math.max(0, Math.floor(pt.x / cell)));
      const gy = Math.min(rows - 1, Math.max(0, Math.floor(pt.y / cell)));
      let best = -1, bestD = Infinity;
      for (let ring = 0; ring < Math.max(cols, rows); ring++) {
        for (let cy = gy - ring; cy <= gy + ring; cy++) {
          if (cy < 0 || cy >= rows) continue;
          for (let cx = gx - ring; cx <= gx + ring; cx++) {
            if (cx < 0 || cx >= cols) continue;
            if (ring > 0 && cx > gx - ring && cx < gx + ring && cy > gy - ring && cy < gy + ring) continue; // 外周のみ
            const b = grid.get(key(cx, cy));
            if (!b) continue;
            for (const idx of b) {
              if (used[idx]) continue;
              const p = particles[idx];
              const d = (p.x - pt.x) ** 2 + (p.y - pt.y) ** 2;
              if (d < bestD) { bestD = d; best = idx; }
            }
          }
        }
        // 近傍リングで見つかり、次リング分の距離を超えていれば確定
        if (best >= 0 && Math.sqrt(bestD) < (ring) * cell) break;
        if (best >= 0 && ring >= 2) break;
      }
      if (best < 0) { for (let k = 0; k < particles.length; k++) if (!used[k]) { best = k; break; } }
      if (best < 0) break;
      used[best] = 1;
      const p = particles[best];
      p.tx = pt.x; p.ty = pt.y; p.active = true;
    }
    // 余った粒子は不活性化して外へ散る
    for (let i = 0; i < particles.length; i++) {
      if (!used[i]) {
        particles[i].active = false;
        const a = Math.random() * Math.PI * 2;
        particles[i].tx = W / 2 + Math.cos(a) * Math.max(W, H);
        particles[i].ty = H / 2 + Math.sin(a) * Math.max(W, H);
      }
    }
  }

  function nextWord(step) {
    wordIndex = (wordIndex + step + words.length) % words.length;
    assignTargets(sampleWord(words[wordIndex]));
    autoT = 0;
  }

  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    assignTargets(sampleWord(words[wordIndex]));
  }

  canvas.addEventListener("pointerdown", (e) => {
    canvas.setPointerCapture?.(e.pointerId);
    nextWord(1);
  });

  let autoT = 0, last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    autoT += dt;
    if (!reduce.matches && autoT > 3.6) nextWord(1);

    ctx.clearRect(0, 0, W, H);
    const stiff = reduce.matches ? 40 : 15;
    const damp = Math.exp(-9 * dt);

    for (const p of particles) {
      p.vx += (p.tx - p.x) * stiff * dt;
      p.vy += (p.ty - p.y) * stiff * dt;
      p.vx *= damp; p.vy *= damp;
      p.x += p.vx * dt; p.y += p.vy * dt;
    }
    for (const p of particles) {
      if (!p.active) continue;
      const speed = Math.hypot(p.vx, p.vy);
      const settle = Math.max(0, 1 - speed / 90);
      ctx.globalAlpha = 0.4 + settle * 0.55;
      ctx.fillStyle = settle > 0.7 ? COL.accent : (settle > 0.3 ? COL.soft : COL.muted);
      const r = p.size * (0.8 + settle * 0.5);
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame((t) => { last = t; requestAnimationFrame(frame); });
})();
</script>
</body>
</html>
