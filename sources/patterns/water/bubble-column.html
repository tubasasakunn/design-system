<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pattern-title" content="立ちのぼる気泡">
<meta name="pattern-desc" content="大小の気泡が揺らぎながら立ちのぼり、水面で弾ける。クリック・長押しで気泡を放てる。">
<title>立ちのぼる気泡</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif; background: var(--color-bg-primary); }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: pointer; }
  .hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: .55rem 1.15rem; border-radius: 999px; font-size: .78rem; letter-spacing: .05em;
    color: var(--color-fg-secondary);
    background: color-mix(in srgb, var(--color-bg-elevated) 78%, transparent);
    border: 1px solid var(--color-border-default);
    backdrop-filter: blur(8px); pointer-events: none; white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="hint">クリック / 長押しで気泡がのぼる ─ 大きな泡ほど速く、大きく揺れる</div>
<script>
(() => {
"use strict";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");

// ---- テーマトークン ----
const token = (n, fb) => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || fb;
const hexRgb = (h) => {
  h = h.replace("#", "");
  if (h.length === 3) h = h.replace(/./g, (c) => c + c);
  const n = parseInt(h.slice(0, 6), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
};
const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;
const mix = (a, b, t) => [
  Math.round(a[0] + (b[0] - a[0]) * t),
  Math.round(a[1] + (b[1] - a[1]) * t),
  Math.round(a[2] + (b[2] - a[2]) * t),
];
const C = {};
const refreshColors = () => {
  C.air  = hexRgb(token("--color-bg-primary", "#faf7f1"));
  C.deep = hexRgb(token("--color-bg-secondary", "#f1ece2"));
  C.hi   = hexRgb(token("--color-bg-elevated", "#fffdf9"));
  C.acc  = hexRgb(token("--color-accent-default", "#5bbcb1"));
  C.accD = hexRgb(token("--color-accent-hover", "#46a89d"));
  // 泡・きらめきの色：暗い外観では明るい水色へ寄せて見えを保つ
  const lum = (c) => (0.299 * c[0] + 0.587 * c[1] + 0.114 * c[2]) / 255;
  C.foam = lum(C.air) < 0.45 ? mix(C.acc, [236, 246, 243], 0.68) : C.hi;
};
refreshColors();
new MutationObserver(refreshColors).observe(document.documentElement, {
  attributes: true, attributeFilter: ["data-theme", "data-appearance"],
});

// ---- キャンバス ----
let W = 0, H = 0;
const resize = () => {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
};
window.addEventListener("resize", resize);
resize();

const rmq = window.matchMedia("(prefers-reduced-motion: reduce)");
let reduced = rmq.matches;
rmq.addEventListener?.("change", (e) => { reduced = e.matches; });

// ---- 水面 ----
const SURF = () => H * 0.17;
const surfAt = (x, t) =>
  SURF() + Math.sin(x * 0.011 + t * 1.15) * 3.5 + Math.sin(x * 0.027 - t * 0.8) * 2.2;

// ---- 気泡・飛沫 ----
const bubbles = [], rings = [], drops = [];
const rand = (a, b) => a + Math.random() * (b - a);

function spawn(x, y, r) {
  if (bubbles.length > 300) return;
  bubbles.push({
    x, bx: x, y, r,
    v: rand(6, 18),                       // 上昇速度（浮力へ漸近）
    ph: Math.random() * Math.PI * 2,      // 揺れ位相
    freq: 7.5 / Math.sqrt(r),             // 小さい泡ほど細かく震える
    amp: r * 0.55 + 1.2,                  // 大きい泡ほど大きく蛇行する
    squash: 0,
  });
}

function pop(b, t) {
  const sy = surfAt(b.x, t);
  rings.push({ x: b.x, y: sy + 1, r: b.r * 0.8, max: b.r * 2.6 + 6, a: 0.6, w: Math.max(1.2, b.r * 0.28) });
  const n = 2 + Math.round(b.r * 0.35);
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + rand(-0.9, 0.9);
    const sp = rand(22, 55) * (0.5 + b.r / 14);
    drops.push({ x: b.x, y: sy - 1, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: rand(0.8, 1.6 + b.r * 0.12), life: 1 });
  }
}

// ---- 入力（pointer events でマウス/タッチ両対応）----
let pointer = null, holdAcc = 0;
const burst = (x, y) => {
  const yy = Math.max(y, SURF() + 30);
  for (let i = 0; i < 5; i++) spawn(x + rand(-14, 14), yy + rand(-8, 8), rand(2, 11));
};
canvas.addEventListener("pointerdown", (e) => {
  canvas.setPointerCapture?.(e.pointerId);
  pointer = { x: e.clientX, y: e.clientY };
  burst(pointer.x, pointer.y);
});
canvas.addEventListener("pointermove", (e) => { if (pointer) { pointer.x = e.clientX; pointer.y = e.clientY; } });
const endPointer = () => { pointer = null; };
canvas.addEventListener("pointerup", endPointer);
canvas.addEventListener("pointercancel", endPointer);

// ---- 常在の気泡柱 ----
const emitters = [{ u: 0.24 }, { u: 0.5 }, { u: 0.76 }];
let emitAcc = 0;
// 初期状態でも画面が寂しくないよう種を撒く（reduce 時は静止させたいので撒かない）
if (!reduced) for (let i = 0; i < 14; i++) spawn(rand(0, W), rand(SURF() + 80, H), Math.pow(Math.random(), 1.6) * 10 + 2);

// ---- メインループ ----
let last = performance.now(), t = 0;
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  if (!reduced) {
    t += dt;
    emitAcc += dt;
    while (emitAcc > 0.1) {                       // 気泡柱＋散発
      emitAcc -= 0.1;
      const em = emitters[(Math.random() * emitters.length) | 0];
      if (Math.random() < 0.9) spawn(W * em.u + rand(-18, 18), H + 12, Math.pow(Math.random(), 1.7) * 10 + 2);
      if (Math.random() < 0.22) spawn(rand(0, W), H + 12, rand(2, 5));
    }
  }
  if (pointer) {                                  // 長押しで連続発生（操作起点なので reduce 中も可）
    holdAcc += dt;
    while (holdAcc > 0.07) {
      holdAcc -= 0.07;
      spawn(pointer.x + rand(-10, 10), Math.max(pointer.y, SURF() + 24) + rand(-6, 6), Math.pow(Math.random(), 1.4) * 9 + 2);
    }
  }

  // 気泡の物理：浮力（サイズ比例の終端速度）へ漸近 ＋ 正弦の蛇行
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    const vt = 26 + b.r * 7.5;
    b.v += (vt - b.v) * Math.min(1, dt * 1.8);
    b.y -= b.v * dt;
    b.ph += b.freq * dt;
    b.bx += Math.sin(t * 0.4 + b.ph * 0.13) * 2 * dt;
    b.x = b.bx + Math.sin(b.ph) * b.amp;
    b.squash = Math.min(0.28, b.v / 280);
    if (b.y - b.r * 0.4 < surfAt(b.x, t)) { pop(b, t); bubbles.splice(i, 1); }
  }
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    r.r += (r.max - r.r) * Math.min(1, dt * 5);
    r.a -= dt * 1.1;
    if (r.a <= 0) rings.splice(i, 1);
  }
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    d.vy += 320 * dt; d.x += d.vx * dt; d.y += d.vy * dt; d.life -= dt * 1.5;
    if (d.life <= 0 || d.y > surfAt(d.x, t) + 4) drops.splice(i, 1);
  }

  draw();
  requestAnimationFrame(frame);
}

function draw() {
  // 空気の帯
  ctx.fillStyle = rgba(C.air, 1);
  ctx.fillRect(0, 0, W, H);

  // 水の本体（波打つ水面から下へ、深さのグラデーション）
  const g = ctx.createLinearGradient(0, SURF(), 0, H);
  g.addColorStop(0, rgba(mix(C.deep, C.acc, 0.18), 1));
  g.addColorStop(1, rgba(mix(C.deep, C.accD, 0.42), 1));
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W + 8; x += 8) ctx.lineTo(x, surfAt(x, t));
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.fill();

  // 水面のきらめき線
  ctx.beginPath();
  for (let x = 0; x <= W + 8; x += 8) { const y = surfAt(x, t); x ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }
  ctx.strokeStyle = rgba(C.foam, 0.85);
  ctx.lineWidth = 1.6;
  ctx.stroke();

  // 気泡：速度で縦につぶれ、ハイライトで球感を出す
  for (const b of bubbles) {
    const ry = b.r * (1 - b.squash), rx = b.r * (1 + b.squash * 0.7);
    const depth = Math.min(1, Math.max(0, (b.y - SURF()) / Math.max(1, H - SURF())));
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = rgba(C.foam, 0.14 + 0.12 * (1 - depth));
    ctx.fill();
    ctx.strokeStyle = rgba(mix(C.accD, C.foam, 0.22), 0.6);
    ctx.lineWidth = Math.max(1, b.r * 0.17);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(b.x - rx * 0.32, b.y - ry * 0.38, rx * 0.3, ry * 0.22, -0.7, 0, Math.PI * 2);
    ctx.fillStyle = rgba(C.foam, 0.7);
    ctx.fill();
  }

  // 弾けた輪と飛沫（水面より上の世界）
  for (const r of rings) {
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.r, r.r * 0.34, 0, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(C.foam, Math.max(0, r.a));
    ctx.lineWidth = r.w;
    ctx.stroke();
  }
  for (const d of drops) {
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = rgba(mix(C.foam, C.acc, 0.3), Math.max(0, d.life) * 0.8);
    ctx.fill();
  }
}

requestAnimationFrame(frame);
})();
</script>
</body>
</html>
